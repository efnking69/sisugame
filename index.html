<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisu Game Päivitetty - DELUXE</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: 'Tahoma', sans-serif; overflow: hidden; }
        
        /* RAINBOW ONLINE COUNTER */
        #online-counter { 
            position: absolute; top: 10px; right: 20px; 
            font-size: 36px; font-weight: bold; z-index: 50; 
            font-family: 'Comic Sans MS', 'Tahoma', sans-serif;
            animation: rainbow-cycle 2s linear infinite; 
        }
        @keyframes rainbow-cycle {
            0% { color: red; } 16% { color: orange; } 33% { color: yellow; }
            50% { color: green; } 66% { color: blue; } 83% { color: indigo; } 100% { color: red; }
        }

        /* UI PANELS */
        #login-screen, #death-screen { 
            position: absolute; inset: 0; background: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
        }
        #delete-acc-btn {
            position: absolute; top: 10px; left: 10px;
            background: #ff4444; color: white; border: none; padding: 12px;
            cursor: pointer; font-weight: bold; z-index: 101; border-radius: 0;
        }

        /* HOTBAR */
        #hotbar {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.9); padding: 10px; border: 2px solid #444; z-index: 60;
        }
        .slot { width: 60px; height: 60px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; position: relative; }
        .slot.active { border-color: #00ff00; background: rgba(0, 255, 0, 0.2); }
        .slot span { position: absolute; top: 2px; left: 4px; font-size: 12px; color: #aaa; }

        /* SQUARE BLACK CHAT */
        #chat-container { 
            position: absolute; bottom: 100px; left: 20px; width: 380px; height: 300px; 
            background: black; border: 2px solid #333; display: flex; flex-direction: column; z-index: 60; 
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: white; font-size: 14px; }
        #chat-customizer { background: #1a1a1a; padding: 5px; display: flex; gap: 5px; border-top: 1px solid #333; }
        #chat-input { background: #222; border: none; color: white; padding: 12px; outline: none; width: 100%; box-sizing: border-box; }

        /* CHARACTER SELECT */
        .char-opt { padding: 15px; border: 3px solid #ccc; cursor: pointer; background: #f9f9f9; transition: 0.2s; }
        .char-opt:hover { background: #eee; }
        .char-opt.selected { border-color: #00ff00; background: #e0ffe0; }

        /* ADMIN PANEL (IMGUI STYLE) */
        #admin-panel {
            position: absolute; top: 60px; left: 10px;
            background: #111; border: 1px solid #0f0; color: #0f0;
            padding: 15px; display: none; z-index: 70; font-family: 'Courier New', monospace;
            box-shadow: 5px 5px 0px black;
        }

        /* ANIMATIONS */
        .gold-tag {
            background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: gold-slide 2s linear infinite;
            font-weight: bold;
        }
        @keyframes gold-slide { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .death-text { color: red; font-size: 45px; animation: shake 0.1s infinite; text-align: center; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }

        canvas { display: block; background: #ffffff; }
    </style>
</head>
<body>

    <button id="delete-acc-btn">DELETE ACCOUNT</button>
    <div id="online-counter">Online: 0</div>

    <div id="login-screen">
        <h1 style="font-family: 'Comic Sans MS'; font-size: 40px;">Sisu Game Päivitetty</h1>
        <input type="text" id="username-input" placeholder="Username (A-Z, 0-9, Ä, Ö)..." maxlength="20" style="padding:10px; width:250px;">
        
        <h3>Valitse Hahmo:</h3>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <div class="char-opt selected" onclick="selChar('stickman', this)">Stickman</div>
            <div class="char-opt" onclick="selChar('redstickman', this)">Red Stick</div>
            <div class="char-opt" onclick="selChar('mario', this)">Super Mario</div>
            <div class="char-opt" onclick="selChar('princess', this)">Princess</div>
        </div>

        <button id="login-btn" style="padding:15px 50px; font-weight:bold; cursor:pointer;">PELAA</button>
        <p id="error-msg" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="death-screen" style="display:none;">
        <h1 class="death-text">kuolit hahahahahahahahahahahHAHAHAHAAH</h1>
        <button onclick="location.reload()" style="padding:15px 30px;">TEE UUSI TILI</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="admin-panel">
            <b>[eelaska cheat menu]</b><hr>
            <label><input type="checkbox" id="fly-hack"> FLY MODE</label><br>
            <label><input type="checkbox" id="gun-hack"> ENABLE GUN</label>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-customizer">
                <select id="font-select">
                    <option value="Tahoma">Tahoma</option>
                    <option value="'Comic Sans MS'">Comic Sans</option>
                    <option value="Arial">Arial</option>
                </select>
                <select id="color-select">
                    <option value="white">White</option>
                    <option value="pink">Pink</option>
                    <option value="cyan">Blue</option>
                    <option value="#0f0">Green</option>
                    <option value="rainbow">Rainbow</option>
                </select>
            </div>
            <input type="text" id="chat-input" placeholder="Kirjoita viesti..." maxlength="200">
        </div>

        <div id="hotbar">
            <div class="slot active" id="slot1"><span>1</span>Wood</div>
            <div class="slot" id="slot2"><span>2</span>Stone</div>
            <div class="slot" id="slot3"><span>3</span>Eraser</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
            authDomain: "gamesisu-837b9.firebaseapp.com",
            projectId: "gamesisu-837b9",
            databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONSTANTS & STATE ---
        const BLOCK_SIZE = 60;
        const PLAYER_W = 40;
        const PLAYER_H = 80;
        const jumpSound = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
        
        let selectedChar = 'stickman';
        let myData = JSON.parse(localStorage.getItem('sisu_user_v2')) || null;
        let players = {};
        let blocks = {};
        let myBullets = [];
        let lastAction = 0;
        let lastChat = 0;

        window.selChar = (type, el) => {
            selectedChar = type;
            document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        };

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn').onclick = async () => {
            const rawName = document.getElementById('username-input').value.trim();
            const regex = /^[a-zA-Z0-9ääööÄÄÖÖ]+$/;

            if (!regex.test(rawName) || rawName.length > 20) {
                document.getElementById('error-msg').innerText = "Väärä nimi (Max 20, vain kirjaimet/numerot)";
                return;
            }

            const namesRef = ref(db, 'usernames');
            const snap = await get(namesRef);
            let exists = false;
            if (snap.exists()) {
                for (let n in snap.val()) {
                    if (n.toLowerCase() === rawName.toLowerCase()) { exists = true; break; }
                }
            }

            if (exists) {
                document.getElementById('error-msg').innerText = "Nimi varattu!";
                return;
            }

            myData = { id: "u_" + Date.now(), name: rawName, char: selectedChar };
            localStorage.setItem('sisu_user_v2', JSON.stringify(myData));
            set(ref(db, `usernames/${rawName}`), myData.id);
            onDisconnect(ref(db, `usernames/${rawName}`)).remove();
            initGame();
        };

        document.getElementById('delete-acc-btn').onclick = () => {
            if (myData) {
                remove(ref(db, `usernames/${myData.name}`));
                remove(ref(db, `players/${myData.id}`));
            }
            localStorage.removeItem('sisu_user_v2');
            location.reload();
        };

        if (myData) initGame();

        function initGame() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            if (myData.name.toLowerCase() === "eelaska") document.getElementById('admin-panel').style.display = 'block';

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pRef = ref(db, `players/${myData.id}`);
            let player = { x: 300, y: 100, vx: 0, vy: 0, facing: 1, walking: false, frame: 0, slot: 1, char: myData.char, font: "Tahoma", chatCol: "white", dead: false };
            
            set(pRef, player);
            onDisconnect(pRef).remove();

            onValue(ref(db, 'players'), s => {
                players = s.val() || {};
                document.getElementById('online-counter').innerText = "Online: " + Object.keys(players).length;
                if (players[myData.id]?.dead) {
                    remove(pRef);
                    document.getElementById('death-screen').style.display = 'flex';
                }
            });
            onValue(ref(db, 'blocks'), s => blocks = s.val() || {});

            // Keys
            const keys = {};
            window.onkeydown = (e) => {
                if (document.activeElement.id === 'chat-input') return;
                keys[e.key.toLowerCase()] = true;
                if (['1','2','3'].includes(e.key)) {
                    player.slot = parseInt(e.key);
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                    document.getElementById('slot'+e.key).classList.add('active');
                }
            };
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

            // Chat
            const chatIn = document.getElementById('chat-input');
            chatIn.onkeydown = (e) => {
                if (e.key === 'Enter' && chatIn.value.trim() && Date.now() - lastChat > 500) {
                    lastChat = Date.now();
                    push(ref(db, 'chat'), {
                        sender: myData.name, text: chatIn.value,
                        col: player.chatCol, font: player.font,
                        time: new Date().toLocaleTimeString()
                    });
                    chatIn.value = "";
                }
            };
            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                Object.values(s.val() || {}).slice(-20).forEach(m => {
                    const tag = m.sender.toLowerCase() === 'eelaska' ? '<span class="gold-tag">[OWNER]</span> ' : '';
                    const style = m.col === 'rainbow' ? 'animation: rainbow-cycle 1s linear infinite;' : `color: ${m.col};`;
                    box.innerHTML += `<div><small>${m.time}</small> ${tag}<b>${m.sender}:</b> <span style="font-family:${m.font}; ${style}">${m.text}</span></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('color-select').onchange = (e) => player.chatCol = e.target.value;
            document.getElementById('font-select').onchange = (e) => player.font = e.target.value;

            // Block Stacking & Placing
            window.oncontextmenu = (e) => {
                e.preventDefault();
                if (Date.now() - lastAction < 250) return;
                lastAction = Date.now();

                let tx = Math.floor((player.x + (player.facing * 70)) / 20) * 20;
                let ty = Math.floor(player.y / 20) * 20;

                if (player.slot === 3) {
                    for (let id in blocks) {
                        let b = blocks[id];
                        if (Math.abs(tx - b.x) < 50 && Math.abs(ty - b.y) < 50) { remove(ref(db, `blocks/${id}`)); break; }
                    }
                } else {
                    let finalY = ty;
                    let found = true;
                    while(found) {
                        found = false;
                        for(let id in blocks) { if(Math.abs(tx-blocks[id].x)<50 && Math.abs(finalY-blocks[id].y)<50) { finalY -= BLOCK_SIZE; found = true; } }
                    }
                    push(ref(db, 'blocks'), { x: tx, y: finalY, type: player.slot === 1 ? 'Wood' : 'Stone' });
                }
            };

            // Gun
            window.onclick = (e) => {
                if (myData.name.toLowerCase() === "eelaska" && document.getElementById('gun-hack').checked) {
                    const rect = canvas.getBoundingClientRect();
                    const angle = Math.atan2(e.clientY - rect.top - (player.y + 40), e.clientX - rect.left - (player.x + 20));
                    myBullets.push({ x: player.x + 20, y: player.y + 40, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12 });
                }
            };

            function drawSprite(ctx, p, x, y) {
                const walk = Math.sin(Date.now() * 0.012) * 12;
                ctx.lineWidth = 4;
                ctx.strokeStyle = p.char === 'redstickman' ? 'red' : 'black';
                
                if (p.char.includes('stickman')) {
                    ctx.beginPath(); ctx.arc(x + 20, y + 15, 12, 0, 7); ctx.stroke();
                    ctx.moveTo(x+20, y+27); ctx.lineTo(x+20, y+55);
                    ctx.moveTo(x+20, y+55); ctx.lineTo(x+20+walk, y+80);
                    ctx.moveTo(x+20, y+55); ctx.lineTo(x+20-walk, y+80);
                    ctx.stroke();
                } else if (p.char === 'mario') {
                    ctx.fillStyle = "red"; ctx.fillRect(x+5, y+5, 30, 25); // Hat
                    ctx.fillStyle = "#ffcc99"; ctx.fillRect(x+8, y+25, 24, 20); // Face
                    ctx.fillStyle = "blue"; ctx.fillRect(x+5, y+45, 30, 35); // Body
                } else { // Princess
                    ctx.fillStyle = "pink"; ctx.beginPath(); ctx.moveTo(x+20, y+15); ctx.lineTo(x-5, y+80); ctx.lineTo(x+45, y+80); ctx.fill();
                    ctx.fillStyle = "yellow"; ctx.arc(x+20, y+15, 15, 0, 7); ctx.fill();
                }

                // Nametags
                const isOwner = p.name.toLowerCase() === 'eelaska';
                ctx.textAlign = "center";
                if (isOwner) {
                    ctx.font = "bold 14px Tahoma";
                    ctx.fillStyle = "gold"; // Simplified for canvas draw, gold-tag class handles chat
                    ctx.fillText("[OWNER]", x+20, y-25);
                }
                ctx.fillStyle = "black"; ctx.font = "bold 15px Tahoma";
                ctx.fillText(p.name, x+20, y-8);
            }

            function loop() {
                const fly = document.getElementById('fly-hack').checked && myData.name.toLowerCase() === "eelaska";
                
                if (keys['a']) { player.vx = -6; player.facing = -1; player.walking = true; }
                else if (keys['d']) { player.vx = 6; player.facing = 1; player.walking = true; }
                else { player.vx *= 0.85; player.walking = false; }

                if (fly) {
                    if (keys['w']) player.vy = -6; else if (keys['s']) player.vy = 6; else player.vy = 0;
                } else {
                    player.vy += 0.5;
                }

                player.x += player.vx;
                player.y += player.vy;

                // Ground & Block Collision
                let onGround = false;
                const GROUND = canvas.height - 100;
                if (player.y > GROUND - PLAYER_H) { player.y = GROUND - PLAYER_H; player.vy = 0; onGround = true; }

                for (let id in blocks) {
                    let b = blocks[id];
                    if (player.x < b.x + BLOCK_SIZE && player.x + PLAYER_W > b.x && player.y + PLAYER_H > b.y && player.y < b.y + BLOCK_SIZE) {
                        if (player.vy > 0 && player.y + PLAYER_H < b.y + 20) {
                            player.y = b.y - PLAYER_H; player.vy = 0; onGround = true;
                        } else {
                            // Push
                            b.x += player.vx; 
                            update(ref(db, `blocks/${id}`), { x: b.x });
                            player.x -= player.vx;
                        }
                    }
                }

                if (keys['w'] && onGround && !fly) { player.vy = -12; jumpSound.play(); }

                update(pRef, { ...player, name: myData.name });

                ctx.clearRect(0,0,canvas.width,canvas.height);
                // Floor
                ctx.fillStyle = "#444"; ctx.fillRect(0, GROUND, canvas.width, 100);

                for (let id in blocks) {
                    let b = blocks[id];
                    ctx.fillStyle = b.type === 'Wood' ? '#8B4513' : '#666';
                    ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }

                for (let id in players) {
                    if (id !== myId) drawSprite(ctx, players[id], players[id].x, players[id].y);
                }
                drawSprite(ctx, player, player.x, player.y);

                // Bullets
                myBullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, 8, 8);
                    for (let pid in players) {
                        if (pid !== myId && b.x > players[pid].x && b.x < players[pid].x + PLAYER_W && b.y > players[pid].y && b.y < players[pid].y + PLAYER_H) {
                            update(ref(db, `players/${pid}`), { dead: true });
                            myBullets.splice(i, 1);
                        }
                    }
                });

                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
