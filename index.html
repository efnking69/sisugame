<!DOCTYPE html>
<html lang="fi">
<head>
    <meta property="og:type" content="website">
    <meta property="og:title" content="sisugame">
    <meta property="og:description" content="Tosi hassu moninpeli sisugame!">
    <meta property="og:image" content="https://i.ibb.co/bMNLTFKg/Gemini-Generated-Image-6j4e356j4e356j4e.png">
    <meta name="theme-color" content="#FFD700">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sisugame - THE REAL FULL VERSION</title>
    <style>
        body { margin: 0; background: #111; font-family: 'Tahoma', sans-serif; overflow: hidden; color: white; }
        canvas { display: block; background: #87CEEB; cursor: crosshair; }
        
        #online-counter { 
            position: absolute; top: 12px; right: 20px; 
            font-size: 36px; font-weight: bold; z-index: 50; 
            text-shadow: 2px 2px 6px black; font-family: 'Comic Sans MS'; 
            animation: rainbow-cycle 2s linear infinite; 
        }
        @keyframes rainbow-cycle { 0% { color: red; } 16% { color: orange; } 33% { color: yellow; } 50% { color: green; } 66% { color: blue; } 83% { color: indigo; } 100% { color: red; } }

        /* UI PANELS */
        #login-screen, #death-screen { position: absolute; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        #delete-acc-btn { position: absolute; top: 10px; left: 10px; background: #c00; color: white; border: 2px solid black; padding: 10px 16px; cursor: pointer; z-index: 101; font-weight: bold; }

        /* ERROR OVERLAY */
        #error-overlay { position: absolute; inset: 0; background: rgba(255,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; }
        #error-box { background: white; color: black; padding: 50px; border: 10px solid red; text-align: center; box-shadow: 0 0 50px black; }
        #error-box h2 { color: red; font-size: 60px; margin: 0; font-family: 'Impact'; }
        #error-btn { margin-top: 30px; padding: 15px 40px; font-size: 25px; font-weight: bold; cursor: pointer; }

        /* CHAT & CHAR SELECT */
        #chat-container { position: absolute; bottom: 120px; left: 20px; width: 460px; height: 380px; background: rgba(0,0,0,0.9); border: 3px solid #555; z-index: 60; border-radius: 8px; display: flex; flex-direction: column; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 12px; font-size: 15px; }
        #chat-customizer { padding: 8px; background: #1a1a1a; display: flex; gap: 8px; }
        #chat-input { background: #222; border: none; color: white; padding: 14px; outline: none; width: 100%; box-sizing: border-box; }
        
        #char-selector { position: absolute; bottom: 510px; left: 20px; display: flex; gap: 5px; z-index: 60; }
        .char-btn { padding: 8px 15px; background: #333; color: white; border: 2px solid #666; cursor: pointer; font-weight: bold; }
        .char-btn:hover { background: #555; }

        /* HOTBAR */
        #hotbar { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 12px; border: 4px solid #666; z-index: 60; border-radius: 10px; }
        .slot { width: 70px; height: 70px; background: #444; border: 3px solid #888; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .slot.active { border-color: #0f0; box-shadow: 0 0 20px #0f0; background: #222; }

        /* ADMIN */
        #admin-panel { position: absolute; top: 70px; left: 20px; width: 340px; background: #1e1e2e; border: 3px solid #0f0; color: #ddd; display: none; z-index: 100; border-radius: 8px; overflow: hidden; }
        .gold-tag { background: linear-gradient(90deg, #ffd700, #fff, #ffd700); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gold-slide 2s linear infinite; font-weight: bold; }
        @keyframes gold-slide { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    </style>
</head>
<body>

    <button id="delete-acc-btn" style="display:none;">Päävalikko</button>
    <div id="online-counter">Online: 0</div>
    <audio id="global-audio" loop></audio>

    <div id="error-overlay">
        <div id="error-box">
            <h2>?MITÄ YRITÄT</h2>
            <button id="error-btn" disabled>ODOTA...</button>
        </div>
    </div>

    <div id="login-screen">
        <h1 style="font-size:70px; font-family:'Comic Sans MS'; color:#ff0; margin:0;">SISUGAME</h1>
        <input type="text" id="username-input" placeholder="Käyttäjänimi..." maxlength="20" style="padding:15px; width:350px; font-size:20px;">
        <button id="login-btn" style="padding:20px 100px; font-size:25px; font-weight:bold; background:#0a0; color:white; border:none; cursor:pointer; margin-top:20px;">PELAAN NYT</button>
        <p id="error-msg" style="color:red; font-weight:bold;"></p>
    </div>

    <div id="death-screen" style="display:none;">
        <h1 style="color:red; font-size:60px; font-family: Impact;">kuolit hahahahahahahahaha</h1>
        <button onclick="location.reload()" style="padding:20px 40px; font-size:20px;">TEE UUSI TILI</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="admin-panel">
            <div style="background:#0a0f1f; padding:10px; font-weight:bold; display:flex; justify-content:space-between;">
                <span>🔧 EELASKA ADMIN</span>
                <button onclick="document.getElementById('admin-panel').style.display='none'" style="background:none; border:none; color:red; cursor:pointer; font-size: 20px;">X</button>
            </div>
            <div style="padding:15px;">
                <label><input type="checkbox" id="fly-hack"> ✈️ Lentotila</label><br>
                <label><input type="checkbox" id="gun-hack"> 🔫 Ase (Vasen klik)</label><br><hr>
                <button id="play-global" style="width:100%; padding:10px; margin-bottom:5px; cursor:pointer;">▶ SOITA RICKROLL</button>
                <button id="stop-global" style="width:100%; padding:10px; cursor:pointer;">⏹ STOP</button>
            </div>
        </div>

        <div id="char-selector">
            <button class="char-btn" onclick="changeChar('stickman')">Tikku</button>
            <button class="char-btn" onclick="changeChar('redstickman')">Punainen</button>
            <button class="char-btn" onclick="changeChar('mario')">Mario</button>
            <button class="char-btn" onclick="changeChar('princess')">Prinsessa</button>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-customizer">
                <select id="font-select"><option value="Tahoma">Tahoma</option><option value="'Comic Sans MS'">Comic Sans</option></select>
                <select id="color-select"><option value="#fff">White</option><option value="rainbow">🌈 Rainbow</option></select>
            </div>
            <input type="text" id="chat-input" placeholder="Kirjoita viesti...">
        </div>

        <div id="hotbar">
            <div class="slot active" id="slot1">1<br>Wood</div>
            <div class="slot" id="slot2">2<br>Stone</div>
            <div class="slot" id="slot3">3<br>Eraser</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
            authDomain: "gamesisu-837b9.firebaseapp.com",
            projectId: "gamesisu-837b9",
            databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const BLOCK_SIZE = 60;
        const WORLD_LIMIT_X = 50; 
        const CEILING_LIMIT = -25;
        const PLAYER_W = 40;
        const PLAYER_H = 80;

        let myData = null, pLocal = null, players = {}, blocks = {}, keys = {}, cameraX = 0, cameraY = 0;
        let isErrorVisible = false, myBullets = [];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const globalAudio = document.getElementById('global-audio');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        window.changeChar = (type) => { if(pLocal) pLocal.char = type; };

        function showError() {
            isErrorVisible = true;
            const overlay = document.getElementById('error-overlay');
            const btn = document.getElementById('error-btn');
            overlay.style.display = 'flex';
            let timer = 2;
            btn.disabled = true;
            btn.innerText = `ODOTA... (${timer})`;
            const int = setInterval(() => {
                timer--;
                btn.innerText = `ODOTA... (${timer})`;
                if(timer <= 0) { clearInterval(int); btn.disabled = false; btn.innerText = "YMMÄRRETTY!"; }
            }, 1000);
        }
        document.getElementById('error-btn').onclick = () => { document.getElementById('error-overlay').style.display = 'none'; isErrorVisible = false; };

        // --- DRAWING FUNCTIONS ---
        function drawMario(ctx, x, y) {
            ctx.fillStyle = "red"; ctx.fillRect(x + 5, y, 30, 10); ctx.fillRect(x + 5, y - 5, 20, 5); // Hat
            ctx.fillStyle = "#FFCC99"; ctx.fillRect(x + 8, y + 10, 24, 20); // Face
            ctx.fillStyle = "black"; ctx.fillRect(x + 22, y + 14, 4, 4); ctx.fillRect(x + 18, y + 22, 10, 4); // Eyes/Moustache
            ctx.fillStyle = "red"; ctx.fillRect(x + 5, y + 30, 30, 20); // Shirt
            ctx.fillStyle = "blue"; ctx.fillRect(x + 5, y + 50, 30, 25); // Overalls
            ctx.fillStyle = "yellow"; ctx.fillRect(x + 10, y + 55, 5, 5); ctx.fillRect(x + 25, y + 55, 5, 5); // Buttons
            ctx.fillStyle = "#663300"; ctx.fillRect(x + 2, y + 75, 12, 8); ctx.fillRect(x + 26, y + 75, 12, 8); // Shoes
        }

        function drawPrincess(ctx, x, y) {
            ctx.fillStyle = "pink"; ctx.beginPath(); ctx.moveTo(x+20, y+15); ctx.lineTo(x-10, y+80); ctx.lineTo(x+50, y+80); ctx.fill(); // Dress
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(x+20, y+15, 18, 0, 7); ctx.fill(); // Hair
            ctx.fillStyle = "gold"; ctx.fillRect(x+10, y, 20, 5); // Crown
        }

        function drawStickman(p, sx, sy) {
            ctx.strokeStyle = p.char === 'redstickman' ? 'red' : 'black';
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.arc(sx+20, sy+15, 12, 0, 7); ctx.stroke(); // Head
            ctx.beginPath(); ctx.moveTo(sx+20, sy+27); ctx.lineTo(sx+20, sy+55); ctx.stroke(); // Body
            const w = Math.sin(Date.now()*0.012)*15;
            ctx.beginPath(); ctx.moveTo(sx+20, sy+55); ctx.lineTo(sx+20+w, sy+80); ctx.stroke(); // Leg L
            ctx.beginPath(); ctx.moveTo(sx+20, sy+55); ctx.lineTo(sx+20-w, sy+80); ctx.stroke(); // Leg R
            ctx.beginPath(); ctx.moveTo(sx+20, sy+35); ctx.lineTo(sx+40, sy+45-w/2); ctx.stroke(); // Arm
        }

        document.getElementById('login-btn').onclick = async () => {
            const name = document.getElementById('username-input').value.trim();
            if(name.length < 3) return;
            myData = { id: "u_" + Date.now(), name: name };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('delete-acc-btn').style.display = 'block';
            initGame();
        };

        function initGame() {
            const pRef = ref(db, `players/${myData.id}`);
            pLocal = { x: 0, y: 0, vx: 0, vy: 0, char: 'stickman', slot: 1, name: myData.name, facing: 1 };
            if(myData.name.toLowerCase()==="eelaska") document.getElementById('admin-panel').style.display = 'block';

            onValue(ref(db, 'players'), s => players = s.val() || {});
            onValue(ref(db, 'blocks'), s => blocks = s.val() || {});
            onValue(ref(db, 'server/globalMusic'), s => {
                const m = s.val(); if(!m) return;
                if(globalAudio.src !== m.src) globalAudio.src = m.src;
                m.playing ? globalAudio.play().catch(()=>{}) : globalAudio.pause();
            });

            document.getElementById('play-global').onclick = () => set(ref(db, 'server/globalMusic'), { src: 'https://github.com/Eelaska/sisugame/raw/main/rickroll.mp3', playing: true });
            document.getElementById('stop-global').onclick = () => set(ref(db, 'server/globalMusic'), { playing: false });

            const chatIn = document.getElementById('chat-input');
            chatIn.onkeydown = e => {
                if(e.key==='Enter' && chatIn.value.trim()){
                    push(ref(db, 'chat'), { sender: myData.name, text: chatIn.value, col: document.getElementById('color-select').value });
                    chatIn.value = "";
                }
            };
            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-messages'); box.innerHTML = "";
                Object.values(s.val()||{}).slice(-25).forEach(m => {
                    const tag = m.sender.toLowerCase()==='eelaska' ? '<span class="gold-tag">[OWNER]</span> ' : '';
                    const colStyle = m.col === 'rainbow' ? 'animation: rainbow-cycle 1s linear infinite; font-weight:bold;' : `color:${m.col}`;
                    box.innerHTML += `<div>${tag}<b>${m.sender}:</b> <span style="${colStyle}">${m.text}</span></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            function loop() {
                if(!isErrorVisible) {
                    if(keys['a']) { pLocal.vx = -7; pLocal.facing = -1; }
                    else if(keys['d']) { pLocal.vx = 7; pLocal.facing = 1; }
                    else pLocal.vx *= 0.8;
                    
                    const fly = document.getElementById('fly-hack')?.checked && myData.name.toLowerCase()==='eelaska';
                    if(fly) { 
                        if(keys['w']) pLocal.vy = -7; else if(keys['s']) pLocal.vy = 7; else pLocal.vy = 0; 
                    } else { pLocal.vy += 0.8; }

                    pLocal.x += pLocal.vx; pLocal.y += pLocal.vy;
                    const G = canvas.height - 150;
                    if(pLocal.y > G) { pLocal.y = G; pLocal.vy = 0; }
                    if(keys['w'] && pLocal.vy === 0 && !fly) pLocal.vy = -18;

                    // WORLD BOUNDS
                    if(pLocal.x < -WORLD_LIMIT_X*BLOCK_SIZE) pLocal.x = -WORLD_LIMIT_X*BLOCK_SIZE;
                    if(pLocal.x > WORLD_LIMIT_X*BLOCK_SIZE) pLocal.x = WORLD_LIMIT_X*BLOCK_SIZE;

                    cameraX = pLocal.x - canvas.width/2;
                    cameraY = pLocal.y - canvas.height/2;
                    update(pRef, pLocal);
                }

                ctx.clearRect(0,0,canvas.width,canvas.height);
                
                // --- DRAW WORLD LIMITS ---
                ctx.fillStyle = "#800"; // Brick Red
                for(let i = -40; i < 20; i++) {
                    let y = i * BLOCK_SIZE;
                    let leftX = -WORLD_LIMIT_X*BLOCK_SIZE - 60;
                    let rightX = WORLD_LIMIT_X*BLOCK_SIZE + 60;
                    ctx.fillRect(leftX - cameraX, y - cameraY, 60, 60);
                    ctx.strokeRect(leftX - cameraX, y - cameraY, 60, 60);
                    ctx.fillRect(rightX - cameraX, y - cameraY, 60, 60);
                    ctx.strokeRect(rightX - cameraX, y - cameraY, 60, 60);
                    
                    if(i === 0) {
                        ctx.fillStyle = "white"; ctx.font = "bold 20px Tahoma";
                        ctx.fillText("MAAILMAN LOPPU ):", leftX - 220 - cameraX, y + 35 - cameraY);
                        ctx.fillText("MAAILMAN LOPPU ):", rightX + 80 - cameraX, y + 35 - cameraY);
                        ctx.fillStyle = "#800";
                    }
                }
                // CEILING
                for(let i = -WORLD_LIMIT_X-2; i <= WORLD_LIMIT_X+2; i++) {
                    ctx.fillRect(i*BLOCK_SIZE - cameraX, CEILING_LIMIT*BLOCK_SIZE - cameraY, 60, 60);
                    ctx.strokeRect(i*BLOCK_SIZE - cameraX, CEILING_LIMIT*BLOCK_SIZE - cameraY, 60, 60);
                }

                // --- DRAW BLOCKS ---
                for(let id in blocks) {
                    const b = blocks[id];
                    ctx.fillStyle = b.type==='Wood' ? '#8B4513' : '#555';
                    ctx.fillRect(b.x - cameraX, b.y - cameraY, 60, 60);
                    ctx.strokeStyle = "black"; ctx.lineWidth = 2;
                    ctx.strokeRect(b.x - cameraX, b.y - cameraY, 60, 60);
                }

                // --- DRAW PLAYERS ---
                for(let id in players) {
                    const p = players[id]; const sx = p.x - cameraX, sy = p.y - cameraY;
                    if(p.char==='mario') drawMario(ctx, sx, sy);
                    else if(p.char==='princess') drawPrincess(ctx, sx, sy);
                    else drawStickman(p, sx, sy);
                    ctx.fillStyle="white"; ctx.font="bold 14px Tahoma"; ctx.textAlign="center"; 
                    ctx.fillText(p.name, sx+20, sy-15);
                }

                requestAnimationFrame(loop);
            }

            canvas.oncontextmenu = e => {
                e.preventDefault(); if(isErrorVisible) return;
                const mx = e.clientX + cameraX, my = e.clientY + cameraY;
                const gx = Math.floor(mx/60)*60, gy = Math.floor(my/60)*60;
                
                // BOUNDS CHECK
                if(gx <= -WORLD_LIMIT_X*60 || gx >= WORLD_LIMIT_X*60 || gy <= CEILING_LIMIT*60) return showError();
                
                if(pLocal.slot === 3) {
                    for(let id in blocks) if(Math.abs(blocks[id].x-gx)<10 && Math.abs(blocks[id].y-gy)<10) remove(ref(db, `blocks/${id}`));
                } else {
                    push(ref(db, 'blocks'), { x: gx, y: gy, type: pLocal.slot===1?'Wood':'Stone' });
                }
            };
            
            canvas.onclick = (e) => {
                if(myData.name.toLowerCase()==="eelaska" && document.getElementById('gun-hack').checked) {
                    for(let id in players) if(id!==myData.id) update(ref(db, `players/${id}`), {dead:true});
                }
            };

            loop();
        }

        const keys = {};
        window.onkeydown = e => {
            keys[e.key.toLowerCase()] = true;
            if(['1','2','3'].includes(e.key)) {
                pLocal.slot = +e.key;
                document.querySelectorAll('.slot').forEach(s=>s.classList.remove('active'));
                document.getElementById('slot'+e.key).classList.add('active');
            }
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        document.getElementById('delete-acc-btn').onclick = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
