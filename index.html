<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisu Game Päivitetty - TOTAL EDITION</title>
    <style>
        body { margin: 0; background: #f0f0f0; font-family: 'Tahoma', sans-serif; overflow: hidden; }
        
        /* RAINBOW ONLINE COUNTER */
        #online-counter { 
            position: absolute; top: 10px; right: 20px; 
            font-size: 38px; font-weight: bold; z-index: 50; 
            font-family: 'Comic Sans MS', 'Tahoma', sans-serif;
            animation: rainbow-cycle 2s linear infinite; 
        }
        @keyframes rainbow-cycle {
            0% { color: red; } 16% { color: orange; } 33% { color: yellow; }
            50% { color: green; } 66% { color: blue; } 83% { color: indigo; } 100% { color: red; }
        }

        /* UI PANELS */
        #login-screen, #death-screen { 
            position: absolute; inset: 0; background: white; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; 
        }
        #delete-acc-btn {
            position: absolute; top: 10px; left: 10px;
            background: #ff4444; color: white; border: 2px solid #000; padding: 12px;
            cursor: pointer; font-weight: bold; z-index: 101;
        }

        /* HOTBAR */
        #hotbar {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.9); padding: 10px; border: 3px solid #444; z-index: 60;
        }
        .slot { width: 65px; height: 65px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; position: relative; }
        .slot.active { border-color: #00ff00; background: rgba(0, 255, 0, 0.2); box-shadow: 0 0 10px #00ff00; }
        .slot span { position: absolute; top: 2px; left: 4px; font-size: 12px; color: #aaa; }

        /* SQUARE BLACK CHAT */
        #chat-container { 
            position: absolute; bottom: 110px; left: 20px; width: 400px; height: 320px; 
            background: black; border: 3px solid #333; display: flex; flex-direction: column; z-index: 60; 
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: white; font-size: 14px; border-bottom: 1px solid #333; }
        #chat-customizer { background: #1a1a1a; padding: 8px; display: flex; gap: 8px; }
        #chat-input { background: #222; border: none; color: white; padding: 15px; outline: none; width: 100%; box-sizing: border-box; font-size: 14px; }

        /* CHARACTER SELECT */
        .char-opt { padding: 15px; border: 3px solid #ccc; cursor: pointer; background: #f9f9f9; transition: 0.2s; text-align: center; width: 100px; }
        .char-opt:hover { background: #eee; transform: scale(1.05); }
        .char-opt.selected { border-color: #00ff00; background: #e0ffe0; box-shadow: 0 0 10px rgba(0,255,0,0.5); }

        /* ADMIN PANEL (IMGUI STYLE) */
        #admin-panel {
            position: absolute; top: 70px; left: 10px;
            background: #111; border: 2px solid #0f0; color: #0f0;
            padding: 15px; display: none; z-index: 70; font-family: 'Courier New', monospace;
            box-shadow: 8px 8px 0px black;
        }
        .admin-section { border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; }

        /* GOLD SLIDING OWNER TAG */
        .gold-tag {
            background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: gold-slide 2s linear infinite;
            font-weight: bold; text-shadow: 0 0 2px rgba(255,215,0,0.5);
        }
        @keyframes gold-slide { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .death-text { color: red; font-size: 50px; animation: shake 0.1s infinite; text-align: center; font-family: 'Impact'; }
        @keyframes shake { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -3px); } 100% { transform: translate(2px, 1px); } }

        canvas { display: block; background: #ffffff; cursor: crosshair; }
    </style>
</head>
<body>

    <button id="delete-acc-btn">DELETE ACCOUNT</button>
    <div id="online-counter">Online: 0</div>
    <audio id="global-music" loop></audio>

    <div id="login-screen">
        <h1 style="font-family: 'Comic Sans MS'; font-size: 50px; margin-bottom: 5px;">Sisu Game Päivitetty</h1>
        <p style="margin-bottom: 20px;">The Most Features Edition</p>
        <input type="text" id="username-input" placeholder="Käyttäjänimi..." maxlength="20" style="padding:15px; width:300px; font-size: 18px; border: 2px solid #000;">
        
        <h3>VALITSE HAHMO</h3>
        <div style="display:flex; gap:15px; margin-bottom:30px;">
            <div class="char-opt selected" onclick="selChar('stickman', this)">Stickman</div>
            <div class="char-opt" onclick="selChar('redstickman', this)">Red Stick</div>
            <div class="char-opt" onclick="selChar('mario', this)">Mario</div>
            <div class="char-opt" onclick="selChar('princess', this)">Princess</div>
        </div>

        <button id="login-btn" style="padding:20px 80px; font-weight:bold; font-size: 24px; cursor:pointer; background: #000; color: #fff; border: none;">PELAA</button>
        <p id="error-msg" style="color:red; font-weight:bold; margin-top: 15px;"></p>
    </div>

    <div id="death-screen" style="display:none;">
        <h1 class="death-text">kuolit hahahahahahahahahahahHAHAHAHAAH</h1>
        <div style="color: red; font-size: 20px; margin-bottom: 20px;">Admin poisti sinut olemasta.</div>
        <button onclick="location.reload()" style="padding:20px 40px; font-size: 20px; cursor: pointer;">TEE UUSI TILI</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="admin-panel">
            <b>[EELASKA SECRET PANEL]</b><hr>
            <label><input type="checkbox" id="fly-hack"> LENTOTILA (FLY)</label><br>
            <label><input type="checkbox" id="gun-hack"> ASE (GUN MODE)</label>
            
            <div class="admin-section">
                <b>[GLOBAL MUSIC SYNC]</b><br>
                <label><input type="checkbox" id="music-toggle"> SOITA MUSIIKKIA</label><br>
                <select id="music-select" style="background:#000; color:#0f0; border:1px solid #0f0; margin: 5px 0;">
                    <option value="rickroll.mp3">Rickroll</option>
                    <option value="music1.mp3">Music 1</option>
                    <option value="music2.mp3">Music 2</option>
                </select><br>
                Seek: <input type="range" id="music-seek" min="0" max="300" value="0" style="width:120px; vertical-align: middle;">
            </div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-customizer">
                <select id="font-select">
                    <option value="Tahoma">Tahoma</option>
                    <option value="'Comic Sans MS'">Comic Sans</option>
                    <option value="Arial">Arial</option>
                    <option value="'Courier New'">Retro</option>
                </select>
                <select id="color-select">
                    <option value="white">Valkoinen</option>
                    <option value="rainbow">Rainbow</option>
                    <option value="pink">Pinkki</option>
                    <option value="cyan">Sininen</option>
                    <option value="#0f0">Vihreä</option>
                </select>
            </div>
            <input type="text" id="chat-input" placeholder="Kirjoita viesti (Max 200)..." maxlength="200">
        </div>

        <div id="hotbar">
            <div class="slot active" id="slot1"><span>1</span>Wood</div>
            <div class="slot" id="slot2"><span>2</span>Stone</div>
            <div class="slot" id="slot3"><span>3</span>Eraser</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push, remove, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
            authDomain: "gamesisu-837b9.firebaseapp.com",
            projectId: "gamesisu-837b9",
            databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GLOBAL CONSTANTS ---
        const BLOCK_SIZE = 60;
        const PLAYER_W = 40;
        const PLAYER_H = 80;
        const jumpSfx = new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3');
        const bgMusic = document.getElementById('global-music');
        
        let selectedChar = 'stickman';
        let myData = JSON.parse(localStorage.getItem('sisu_user_v3')) || null;
        let players = {};
        let blocks = {};
        let myBullets = [];
        let lastAction = 0;
        let lastChat = 0;

        window.selChar = (type, el) => {
            selectedChar = type;
            document.querySelectorAll('.char-opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        };

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn').onclick = async () => {
            const rawName = document.getElementById('username-input').value.trim();
            const regex = /^[a-zA-Z0-9ääööÄÄÖÖ]+$/;

            if (!regex.test(rawName) || rawName.length > 20) {
                document.getElementById('error-msg').innerText = "Väärä nimi! (Max 20, vain kirjaimet/numerot)";
                return;
            }

            const namesRef = ref(db, 'usernames');
            const snap = await get(namesRef);
            let exists = false;
            if (snap.exists()) {
                for (let n in snap.val()) {
                    if (n.toLowerCase() === rawName.toLowerCase()) { exists = true; break; }
                }
            }

            if (exists) {
                document.getElementById('error-msg').innerText = "Nimi varattu (Case Insensitive)!";
                return;
            }

            myData = { id: "u_" + Date.now(), name: rawName, char: selectedChar };
            localStorage.setItem('sisu_user_v3', JSON.stringify(myData));
            set(ref(db, `usernames/${rawName}`), myData.id);
            onDisconnect(ref(db, `usernames/${rawName}`)).remove();
            initGame();
        };

        document.getElementById('delete-acc-btn').onclick = () => {
            if (myData) {
                remove(ref(db, `usernames/${myData.name}`));
                remove(ref(db, `players/${myData.id}`));
            }
            localStorage.removeItem('sisu_user_v3');
            location.reload();
        };

        if (myData) initGame();

        function initGame() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            const isOwner = myData.name.toLowerCase() === "eelaska";
            if (isOwner) document.getElementById('admin-panel').style.display = 'block';

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pRef = ref(db, `players/${myData.id}`);
            let pLocal = { 
                x: 300, y: 100, vx: 0, vy: 0, 
                facing: 1, walking: false, frame: 0, 
                slot: 1, char: myData.char, 
                font: "Tahoma", chatCol: "white", 
                dead: false 
            };
            
            set(pRef, { ...pLocal, name: myData.name });
            onDisconnect(pRef).remove();

            // --- MUSIC SYNC ---
            const mRef = ref(db, 'server/music');
            onValue(mRef, (snap) => {
                const m = snap.val();
                if (!m) return;
                if (bgMusic.getAttribute('src') !== m.file) bgMusic.src = m.file;
                if (m.playing) bgMusic.play().catch(()=>{}); else bgMusic.pause();
                if (Math.abs(bgMusic.currentTime - m.time) > 2) bgMusic.currentTime = m.time;
            });

            if (isOwner) {
                const mTog = document.getElementById('music-toggle');
                const mSel = document.getElementById('music-select');
                const mSk = document.getElementById('music-seek');
                const updM = () => update(mRef, { playing: mTog.checked, file: mSel.value, time: parseFloat(mSk.value) });
                mTog.onchange = updM; mSel.onchange = updM; mSk.oninput = updM;
                setInterval(() => { if(mTog.checked) { mSk.value = bgMusic.currentTime; update(mRef, {time: bgMusic.currentTime}); } }, 2000);
            }

            // --- FIREBASE LISTENERS ---
            onValue(ref(db, 'players'), s => {
                players = s.val() || {};
                document.getElementById('online-counter').innerText = "Online: " + Object.keys(players).length;
                if (players[myData.id]?.dead) {
                    remove(pRef);
                    document.getElementById('death-screen').style.display = 'flex';
                }
            });
            onValue(ref(db, 'blocks'), s => blocks = s.val() || {});

            // --- CONTROLS ---
            const keys = {};
            window.onkeydown = (e) => {
                if (document.activeElement.id === 'chat-input') return;
                keys[e.key.toLowerCase()] = true;
                if (['1','2','3'].includes(e.key)) {
                    pLocal.slot = parseInt(e.key);
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                    document.getElementById('slot'+e.key).classList.add('active');
                }
            };
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

            // --- CHAT ---
            const chatIn = document.getElementById('chat-input');
            chatIn.onkeydown = (e) => {
                if (e.key === 'Enter' && chatIn.value.trim() && Date.now() - lastChat > 500) {
                    lastChat = Date.now();
                    push(ref(db, 'chat'), {
                        sender: myData.name, text: chatIn.value,
                        col: document.getElementById('color-select').value, 
                        font: document.getElementById('font-select').value,
                        time: new Date().toLocaleTimeString()
                    });
                    chatIn.value = "";
                }
            };
            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                Object.values(s.val() || {}).slice(-25).forEach(m => {
                    const tag = m.sender.toLowerCase() === 'eelaska' ? '<span class="gold-tag">[OWNER]</span> ' : '';
                    const style = m.col === 'rainbow' ? 'animation: rainbow-cycle 1s linear infinite;' : `color: ${m.col};`;
                    box.innerHTML += `<div><small style="color:#666">${m.time}</small> ${tag}<b>${m.sender}:</b> <span style="font-family:${m.font}; ${style}">${m.text}</span></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });

            // --- BLOCK ACTIONS ---
            window.oncontextmenu = (e) => {
                e.preventDefault();
                if (Date.now() - lastAction < 250) return;
                lastAction = Date.now();

                let tx = Math.floor((pLocal.x + (pLocal.facing * 75)) / 10) * 10;
                let ty = Math.floor(pLocal.y / 10) * 10;

                if (pLocal.slot === 3) {
                    for (let id in blocks) {
                        let b = blocks[id];
                        if (Math.abs(tx - b.x) < 55 && Math.abs(ty - b.y) < 55) { remove(ref(db, `blocks/${id}`)); break; }
                    }
                } else {
                    let finalY = ty;
                    let found = true;
                    while(found) {
                        found = false;
                        for(let id in blocks) { if(Math.abs(tx-blocks[id].x)<55 && Math.abs(finalY-blocks[id].y)<55) { finalY -= BLOCK_SIZE; found = true; } }
                    }
                    push(ref(db, 'blocks'), { x: tx, y: finalY, type: pLocal.slot === 1 ? 'Wood' : 'Stone' });
                }
            };

            // --- OWNER GUN ---
            window.onclick = (e) => {
                if (isOwner && document.getElementById('gun-hack').checked) {
                    const rect = canvas.getBoundingClientRect();
                    const angle = Math.atan2(e.clientY - rect.top - (pLocal.y + 40), e.clientX - rect.left - (pLocal.x + 20));
                    myBullets.push({ x: pLocal.x + 20, y: pLocal.y + 40, vx: Math.cos(angle) * 15, vy: Math.sin(angle) * 15 });
                }
            };

            // --- RENDERER ---
            function drawPlayer(ctx, p, x, y) {
                const walk = Math.sin(Date.now() * 0.012) * 12;
                ctx.lineWidth = 4;
                ctx.lineCap = "round";

                if (p.char.includes('stickman')) {
                    ctx.strokeStyle = p.char === 'redstickman' ? 'red' : 'black';
                    ctx.beginPath(); ctx.arc(x + 20, y + 15, 12, 0, 7); ctx.stroke(); // Head
                    ctx.moveTo(x+20, y+27); ctx.lineTo(x+20, y+55); // Body
                    ctx.moveTo(x+20, y+35); ctx.lineTo(x+20 + (walk*0.5), y+50); // Arm L
                    ctx.moveTo(x+20, y+35); ctx.lineTo(x+20 - (walk*0.5), y+50); // Arm R
                    ctx.moveTo(x+20, y+55); ctx.lineTo(x+20 + walk, y+80); // Leg L
                    ctx.moveTo(x+20, y+55); ctx.lineTo(x+20 - walk, y+80); // Leg R
                    ctx.stroke();
                } else if (p.char === 'mario') {
                    ctx.fillStyle = "red"; ctx.fillRect(x+5, y+5, 30, 20); // Hat
                    ctx.fillStyle = "#ffcc99"; ctx.fillRect(x+8, y+25, 24, 25); // Face
                    ctx.fillStyle = "blue"; ctx.fillRect(x+5, y+50, 30, 30); // Body
                } else { // Princess
                    ctx.fillStyle = "pink"; ctx.beginPath(); ctx.moveTo(x+20, y+15); ctx.lineTo(x-10, y+80); ctx.lineTo(x+50, y+80); ctx.fill();
                    ctx.fillStyle = "yellow"; ctx.arc(x+20, y+15, 18, 0, 7); ctx.fill();
                }

                // Nametags
                const owner = p.name.toLowerCase() === 'eelaska';
                ctx.textAlign = "center";
                if (owner) {
                    ctx.font = "bold 14px Tahoma"; ctx.fillStyle = "gold";
                    ctx.fillText("[OWNER]", x+20, y-28);
                }
                ctx.fillStyle = "black"; ctx.font = "bold 15px Tahoma";
                ctx.fillText(p.name, x+20, y-10);
            }

            // --- GAME LOOP ---
            function loop() {
                const fly = isOwner && document.getElementById('fly-hack').checked;
                
                // Physics
                if (keys['a']) { pLocal.vx = -7; pLocal.facing = -1; pLocal.walking = true; }
                else if (keys['d']) { pLocal.vx = 7; pLocal.facing = 1; pLocal.walking = true; }
                else { pLocal.vx *= 0.8; pLocal.walking = false; }

                if (fly) {
                    if (keys['w']) pLocal.vy = -7; else if (keys['s']) pLocal.vy = 7; else pLocal.vy = 0;
                } else {
                    pLocal.vy += 0.6; // Gravity
                }

                pLocal.x += pLocal.vx;
                pLocal.y += pLocal.vy;

                // Fixed Ground
                const GROUND_LVL = canvas.height - 100;
                let onG = false;
                if (pLocal.y > GROUND_LVL - PLAYER_H) { pLocal.y = GROUND_LVL - PLAYER_H; pLocal.vy = 0; onG = true; }

                // Solid Block Collisions
                for (let id in blocks) {
                    let b = blocks[id];
                    if (pLocal.x < b.x + BLOCK_SIZE && pLocal.x + PLAYER_W > b.x && pLocal.y + PLAYER_H > b.y && pLocal.y < b.y + BLOCK_SIZE) {
                        // Top Collision (Standing)
                        if (pLocal.vy > 0 && pLocal.y + PLAYER_H < b.y + 20) {
                            pLocal.y = b.y - PLAYER_H; pLocal.vy = 0; onG = true;
                        } else {
                            // Side Collision (Pushing)
                            b.x += pLocal.vx; 
                            update(ref(db, `blocks/${id}`), { x: b.x });
                            pLocal.x -= pLocal.vx;
                        }
                    }
                }

                if (keys['w'] && onG && !fly) { pLocal.vy = -14; jumpSfx.play(); }

                update(pRef, { ...pLocal, name: myData.name });

                // DRAWING
                ctx.clearRect(0,0,canvas.width,canvas.height);
                
                // Static Floor
                ctx.fillStyle = "#333"; ctx.fillRect(0, GROUND_LVL, canvas.width, 100);
                ctx.fillStyle = "#222"; ctx.fillRect(0, GROUND_LVL, canvas.width, 5);

                // Blocks
                for (let id in blocks) {
                    let b = blocks[id];
                    ctx.fillStyle = b.type === 'Wood' ? '#8B4513' : '#555';
                    ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }

                // Players
                for (let id in players) {
                    if (id !== myId) drawPlayer(ctx, players[id], players[id].x, players[id].y);
                }
                drawPlayer(ctx, pLocal, pLocal.x, pLocal.y);

                // Owner Bullets
                myBullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, 10, 10);
                    for (let pid in players) {
                        if (pid !== myId && b.x > players[pid].x && b.x < players[pid].x + PLAYER_W && b.y > players[pid].y && b.y < players[pid].y + PLAYER_H) {
                            update(ref(db, `players/${pid}`), { dead: true });
                            myBullets.splice(i, 1);
                        }
                    }
                    if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) myBullets.splice(i, 1);
                });

                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
