<title>SISUGAME</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');

  :root {
    --bg: #0d0d1a;
    --panel: #12122a;
    --border: #2a2a5a;
    --accent: #4fc3f7;
    --accent2: #ff6b6b;
    --gold: #ffd700;
    --green: #69ff47;
    --text: #e0e0ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'VT323', monospace; color: var(--text); overflow: hidden; user-select: none; }

  canvas { display: block; cursor: crosshair; }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    position: absolute; inset: 0; z-index: 300;
    background: #0d0d1a;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px;
  }
  #login-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(79,195,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(255,107,107,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .login-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 52px;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.6), 4px 4px 0 #8B6914;
    animation: title-pulse 2s ease-in-out infinite;
    letter-spacing: 4px;
  }
  .login-sub {
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 3px;
    opacity: 0.8;
  }
  @keyframes title-pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(255,215,0,0.6), 4px 4px 0 #8B6914; }
    50% { text-shadow: 0 0 60px rgba(255,215,0,0.9), 4px 4px 0 #8B6914, 0 0 100px rgba(255,215,0,0.3); }
  }
  .login-box {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 40px 50px;
    display: flex; flex-direction: column; gap: 16px; align-items: center;
    min-width: 380px;
    box-shadow: 0 0 60px rgba(79,195,247,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .login-box input {
    width: 100%; padding: 14px 18px;
    background: #1a1a3a; border: 2px solid var(--border);
    color: var(--text); font-family: 'VT323', monospace; font-size: 22px;
    outline: none; transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box input::placeholder { color: #444466; }
  .btn-play {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #1a6b2e, #2ecc71);
    color: white; font-family: 'Press Start 2P', monospace; font-size: 14px;
    border: none; cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.15s;
    box-shadow: 0 4px 0 #1a4a20, 0 0 20px rgba(46,204,113,0.3);
  }
  .btn-play:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #1a4a20, 0 0 30px rgba(46,204,113,0.5); }
  .btn-play:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a4a20; }
  #login-error { color: var(--accent2); font-size: 18px; min-height: 22px; }

  /* Stars background for login */
  .stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d) ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

  /* ===== DEATH SCREEN ===== */
  #death-screen {
    position: absolute; inset: 0; z-index: 250;
    background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px;
  }
  .death-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 40px; color: var(--accent2);
    text-shadow: 0 0 40px rgba(255,107,107,0.8);
    animation: shake 0.3s ease-in-out infinite;
  }
  @keyframes shake { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
  .death-sub { font-size: 28px; color: #aaa; }
  .btn-respawn {
    padding: 16px 40px;
    background: linear-gradient(135deg, #6b1a1a, var(--accent2));
    color: white; font-family: 'Press Start 2P', monospace; font-size: 12px;
    border: none; cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 4px 0 #4a0000;
    transition: all 0.15s;
  }
  .btn-respawn:hover { transform: translateY(-2px); }

  /* ===== GAME UI ===== */
  #game-ui { display: none; }

  /* Online counter */
  #online-counter {
    position: absolute; top: 14px; right: 20px;
    font-size: 20px; z-index: 60;
    background: rgba(0,0,0,0.6); padding: 6px 14px;
    border: 1px solid var(--border);
    color: var(--green);
  }
  #online-counter span { color: white; }

  /* Hotbar */
  #hotbar {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px;
    background: rgba(10,10,26,0.9); padding: 10px;
    border: 2px solid var(--border);
    z-index: 60;
  }
  .slot {
    width: 68px; height: 68px;
    background: #1a1a3a; border: 2px solid #333366;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 11px; color: #aaa; cursor: pointer;
    transition: all 0.1s; position: relative;
  }
  .slot .slot-num {
    position: absolute; top: 3px; left: 5px;
    font-size: 11px; color: #555588;
  }
  .slot .slot-icon { font-size: 26px; margin-bottom: 2px; }
  .slot .slot-name { font-size: 10px; }
  .slot.active {
    border-color: var(--gold); background: #22224a;
    box-shadow: 0 0 16px rgba(255,215,0,0.4);
    color: var(--gold);
  }

  /* Chat */
  #chat-container {
    position: absolute; bottom: 110px; left: 16px;
    width: 420px; height: 340px;
    background: rgba(10,10,26,0.92); border: 2px solid var(--border);
    z-index: 60; display: flex; flex-direction: column;
  }
  #chat-header {
    background: #1a1a3a; padding: 6px 12px;
    font-size: 14px; color: var(--accent); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  #chat-messages {
    flex: 1; overflow-y: auto; padding: 10px;
    font-size: 16px; display: flex; flex-direction: column; gap: 4px;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-track { background: #111; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
  .chat-msg { line-height: 1.3; word-break: break-word; }
  .chat-time { color: #444466; font-size: 13px; margin-right: 4px; }
  #chat-opts { padding: 6px 10px; background: #12122a; display: flex; gap: 8px; border-top: 1px solid var(--border); }
  #chat-opts select {
    background: #1a1a3a; border: 1px solid var(--border);
    color: var(--text); font-family: 'VT323', monospace; font-size: 15px; padding: 3px 6px;
  }
  #chat-input {
    background: #1a1a3a; border: none; border-top: 1px solid var(--border);
    color: white; padding: 12px 14px; font-family: 'VT323', monospace; font-size: 18px;
    outline: none; width: 100%;
  }

  /* Char selector */
  #char-selector {
    position: absolute; bottom: 110px; right: 16px;
    display: flex; flex-direction: column; gap: 6px; z-index: 60;
  }
  #char-selector-title {
    font-size: 13px; color: var(--accent); text-align: center;
    background: rgba(10,10,26,0.9); padding: 5px 10px;
    border: 1px solid var(--border);
  }
  .char-btn {
    padding: 10px 18px; background: #1a1a3a;
    color: var(--text); border: 2px solid var(--border);
    cursor: pointer; font-family: 'VT323', monospace; font-size: 18px;
    transition: all 0.1s; text-align: left;
  }
  .char-btn:hover { border-color: var(--accent); color: var(--accent); background: #12122a; }
  .char-btn.selected { border-color: var(--gold); color: var(--gold); }

  /* Admin panel */
  #admin-panel {
    position: absolute; top: 60px; left: 16px;
    width: 300px; background: #0a0f1f;
    border: 2px solid #0f0; color: #ddd;
    display: none; z-index: 100;
  }
  #admin-panel .ap-header {
    background: #0a2010; padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #0f0;
  }
  #admin-panel .ap-title { color: #0f0; font-size: 16px; }
  #admin-panel .ap-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  #admin-panel label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 17px; }
  #admin-panel input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  .ap-btn {
    width: 100%; padding: 10px; cursor: pointer;
    background: #1a2a1a; border: 1px solid #0f0; color: #0f0;
    font-family: 'VT323', monospace; font-size: 17px;
    transition: background 0.1s;
  }
  .ap-btn:hover { background: #2a4a2a; }
  .ap-btn.danger { border-color: var(--accent2); color: var(--accent2); background: #2a1a1a; }
  .ap-btn.danger:hover { background: #4a2a2a; }

  /* Gold tag */
  .gold-tag {
    background: linear-gradient(90deg, #ffd700, #fff8, #ffd700);
    background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: gold-slide 2s linear infinite; font-weight: bold;
  }
  @keyframes gold-slide { 0%{background-position:0%} 100%{background-position:200%} }
  @keyframes rainbow-cycle {
    0%{color:red} 16%{color:orange} 33%{color:yellow} 50%{color:lime} 66%{color:dodgerblue} 83%{color:#b44} 100%{color:red}
  }

  /* Menu button */
  #menu-btn {
    position: absolute; top: 14px; left: 16px; z-index: 60;
    background: rgba(10,10,26,0.9); border: 1px solid var(--border);
    color: var(--text); font-family: 'VT323', monospace; font-size: 18px;
    padding: 7px 16px; cursor: pointer; transition: border-color 0.1s;
  }
  #menu-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* Error overlay */
  #error-overlay {
    position: absolute; inset: 0; background: rgba(180,0,0,0.7);
    display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 400;
  }
  #error-box {
    background: #1a0000; color: white; padding: 50px 60px;
    border: 4px solid var(--accent2); text-align: center;
    box-shadow: 0 0 80px rgba(255,0,0,0.5);
  }
  #error-box h2 { color: var(--accent2); font-family: 'Press Start 2P', monospace; font-size: 28px; margin-bottom: 16px; }
  #error-box p { font-size: 22px; color: #ccc; margin-bottom: 24px; }
  #error-btn {
    padding: 14px 40px; background: #2a0000; border: 2px solid var(--accent2);
    color: var(--accent2); font-family: 'VT323', monospace; font-size: 22px; cursor: pointer;
  }
  #error-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Minimap */
  #minimap {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 40px; background: rgba(0,0,0,0.6);
    border: 1px solid var(--border); z-index: 60;
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, push, remove, update, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
  authDomain: "gamesisu-837b9.firebaseapp.com",
  projectId: "gamesisu-837b9",
  databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== CONSTANTS =====
const BS = 60; // block size
const WORLD_W = 60; // blocks each side
const WORLD_H_BLOCKS = 30; // ceiling
const PLAYER_W = 38, PLAYER_H = 72;
const GRAVITY = 0.65;
const JUMP_FORCE = -17;
const GROUND_Y = 600; // canvas-relative base ground
const HP_MAX = 100;
const HP_REGEN = 25;
const HP_REGEN_INTERVAL = 5000;
const GUN_DAMAGE = 50;
const GUN_COOLDOWN = 1000;

// ===== SOUND ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getAudioCtx() {
  if (!actx) actx = new AudioCtx();
  return actx;
}

function playTone(freq, type, duration, vol=0.3, when=0) {
  try {
    const a = getAudioCtx();
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.connect(gain); gain.connect(a.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, a.currentTime + when);
    gain.gain.setValueAtTime(vol, a.currentTime + when);
    gain.gain.exponentialRampToValueAtTime(0.001, a.currentTime + when + duration);
    osc.start(a.currentTime + when);
    osc.stop(a.currentTime + when + duration + 0.05);
  } catch(e){}
}

function sfxJump() { playTone(350,'sine',0.15,0.25); playTone(500,'sine',0.1,0.2,0.08); }
function sfxLand() { playTone(80,'triangle',0.12,0.3); }
function sfxStep() {
  const a = getAudioCtx();
  const buf = a.createBuffer(1,a.sampleRate*0.06,a.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2)*0.4;
  const src = a.createBufferSource();
  const flt = a.createBiquadFilter();
  flt.type='lowpass'; flt.frequency.value=600;
  src.buffer=buf; src.connect(flt); flt.connect(a.destination);
  src.start();
}
function sfxPlace() { playTone(200,'square',0.08,0.15); playTone(260,'square',0.06,0.1,0.06); }
function sfxBreak() {
  playTone(150,'sawtooth',0.1,0.2);
  playTone(100,'sawtooth',0.08,0.15,0.05);
  playTone(80,'square',0.06,0.1,0.1);
}
function sfxGunshot() {
  try {
    const a = getAudioCtx();
    const buf = a.createBuffer(1, a.sampleRate*0.18, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t=i/d.length;
      d[i]=(Math.random()*2-1)*Math.pow(1-t,1.5)*0.8;
    }
    const src = a.createBufferSource();
    const flt = a.createBiquadFilter();
    flt.type='highpass'; flt.frequency.value=100;
    src.buffer=buf; src.connect(flt);
    const gain = a.createGain();
    gain.gain.setValueAtTime(1,a.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.18);
    flt.connect(gain); gain.connect(a.destination);
    src.start();
  } catch(e){}
}
function sfxHit() {
  playTone(220,'sawtooth',0.2,0.4);
  playTone(180,'square',0.15,0.3,0.05);
}

// ===== STAR GENERATOR =====
const starsEl = document.getElementById('stars');
for(let i=0;i<80;i++){
  const s=document.createElement('div');
  s.className='star';
  const size=Math.random()*2.5+0.5;
  s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

// ===== CHARACTERS =====
const CHARACTERS = [
  { id:'tikku', name:'Tikku', color:'#e0e0ff' },
  { id:'punainen', name:'Punainen', color:'#ff4444' },
  { id:'mario', name:'Mario', color:'#ff6b00' },
  { id:'prinsessa', name:'Prinsessa', color:'#ff88cc' },
  { id:'ritari', name:'Ritari', color:'#88aaff' },
  { id:'ninja', name:'Ninja', color:'#222244' },
  { id:'robotti', name:'Robotti', color:'#88ffcc' },
  { id:'poro', name:'Poro', color:'#cc8844' },
];

// Build char selector
const charSel = document.getElementById('char-selector');
CHARACTERS.forEach(c => {
  const btn = document.createElement('button');
  btn.className='char-btn'; btn.dataset.id=c.id;
  btn.textContent=c.name;
  btn.onclick=()=>selectChar(c.id);
  charSel.appendChild(btn);
});

// ===== DRAW FUNCTIONS =====
function drawCharacter(ctx, char, x, y, facing, animFrame, isAir) {
  ctx.save();
  const cx = x + PLAYER_W/2;
  if(facing < 0) { ctx.scale(-1,1); ctx.translate(-2*cx,0); }

  switch(char) {
    case 'tikku': drawTikku(ctx,x,y,animFrame,isAir,'#e0e0ff'); break;
    case 'punainen': drawTikku(ctx,x,y,animFrame,isAir,'#ff4444'); break;
    case 'mario': drawMario(ctx,x,y,animFrame,isAir); break;
    case 'prinsessa': drawPrincess(ctx,x,y,animFrame,isAir); break;
    case 'ritari': drawKnight(ctx,x,y,animFrame,isAir); break;
    case 'ninja': drawNinja(ctx,x,y,animFrame,isAir); break;
    case 'robotti': drawRobot(ctx,x,y,animFrame,isAir); break;
    case 'poro': drawPoro(ctx,x,y,animFrame,isAir); break;
    default: drawTikku(ctx,x,y,animFrame,isAir,'#e0e0ff');
  }
  ctx.restore();
}

function drawTikku(ctx,x,y,f,air,col){
  const t=air?0:Math.sin(f*0.22)*12;
  const t2=air?0:Math.sin(f*0.22+Math.PI)*12;
  ctx.strokeStyle=col; ctx.lineWidth=4; ctx.lineCap='round';
  // Head
  ctx.beginPath(); ctx.arc(x+19,y+12,11,0,7); ctx.stroke();
  // Eyes
  ctx.fillStyle=col; ctx.fillRect(x+14,y+10,3,3); ctx.fillRect(x+21,y+10,3,3);
  // Body
  ctx.beginPath(); ctx.moveTo(x+19,y+23); ctx.lineTo(x+19,y+48); ctx.stroke();
  // Arms
  ctx.beginPath(); ctx.moveTo(x+19,y+30);
  ctx.lineTo(x+35,y+28+Math.sin(f*0.22)*5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+19,y+30);
  ctx.lineTo(x+3,y+28-Math.sin(f*0.22)*5); ctx.stroke();
  // Legs
  ctx.beginPath(); ctx.moveTo(x+19,y+48); ctx.lineTo(x+28,y+48+t); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+19,y+48); ctx.lineTo(x+10,y+48+t2); ctx.stroke();
  // Feet
  ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(x+28,y+48+t); ctx.lineTo(x+36,y+50+t); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+10,y+48+t2); ctx.lineTo(x+2,y+50+t2); ctx.stroke();
}

// ===== BLOCK TYPES =====
const BLOCK_TYPES = {
  1: { name:'Puu',   color:'#8B5E3C', shade:'#6B3E1C', grain:'#A07040', mass:1 },
  2: { name:'Tiili', color:'#b44a2a', shade:'#8B2a0a', grain:'#cc6644', mass:2 },
  3: { name:'Kivi',  color:'#778899', shade:'#556677', grain:'#99aabb', mass:3 },
  4: { name:'Lehti', color:'#2a8a2a', shade:'#1a6a1a', grain:'#44aa44', mass:0.5 },
};

function drawBlock(ctx, bx, by, type) {
  const bt = BLOCK_TYPES[type] || BLOCK_TYPES[1];
  ctx.fillStyle = bt.color;
  ctx.fillRect(bx, by, BS, BS);
  // Shade edges
  ctx.fillStyle = bt.shade;
  ctx.fillRect(bx, by+BS-6, BS, 6);
  ctx.fillRect(bx+BS-6, by, 6, BS);
  // Highlight
  ctx.fillStyle = bt.grain;
  ctx.fillRect(bx, by, BS, 4);
  ctx.fillRect(bx, by, 4, BS);
  // Pattern
  ctx.strokeStyle = bt.shade;
  ctx.lineWidth = 0.5;
  ctx.strokeRect(bx+1, by+1, BS-2, BS-2);
  if(type===1) { // wood grain
    ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=1.5;
    for(let g=10;g<BS;g+=12){ ctx.beginPath(); ctx.moveTo(bx+g,by); ctx.lineTo(bx+g+4,by+BS); ctx.stroke(); }
  } else if(type===2) { // brick pattern
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx,by+BS/2); ctx.lineTo(bx+BS,by+BS/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+BS/2,by); ctx.lineTo(bx+BS/2,by+BS/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx,by+BS/2); ctx.lineTo(bx,by+BS/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+BS/4,by+BS/2); ctx.lineTo(bx+BS/4,by+BS); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+3*BS/4,by+BS/2); ctx.lineTo(bx+3*BS/4,by+BS); ctx.stroke();
  } else if(type===3) { // stone cracks
    ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(bx+10,by+5); ctx.lineTo(bx+25,by+30); ctx.lineTo(bx+15,by+55); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+40,by+10); ctx.lineTo(bx+50,by+40); ctx.stroke();
  } else if(type===4) { // leaf specks
    ctx.fillStyle='rgba(0,0,0,0.1)';
    for(let s=0;s<6;s++) ctx.fillRect(bx+Math.random()*50,by+Math.random()*50,4,4);
  }
}

  onValue(ref(db,`players/${myId}/hp`),s=>{
    const hp=s.val();
    if(hp!==null && hp!==undefined && myHp!==hp){ myHp=hp; if(myHp<=0&&!isDead) dieProperly(); }
  });
  onValue(ref(db,`players/${myId}/dead`),s=>{ if(s.val()===true && !isDead) dieProperly(); });
  onValue(ref(db,'server/globalMusic'),s=>{
    const m=s.val(); if(!m) return;
    if(globalAudio.src!==m.src) globalAudio.src=m.src;
    m.playing ? globalAudio.play().catch(()=>{}) : globalAudio.pause();
  });

  // Disconnect cleanup
  onDisconnect(pRef).remove();

  // Admin buttons
  document.getElementById('play-global').onclick=()=>set(ref(db,'server/globalMusic'),{src:'https://github.com/Eelaska/sisugame/raw/main/rickroll.mp3',playing:true});
  document.getElementById('stop-global').onclick=()=>set(ref(db,'server/globalMusic'),{playing:false});
  document.getElementById('kill-all-btn').onclick=()=>{
    Object.keys(players).forEach(id=>{ if(id!==myId) update(ref(db,`players/${id}`),{dead:true,hp:0}); });
  };

  // Chat
  const chatIn=document.getElementById('chat-input');
  chatIn.onkeydown=e=>{
    if(e.key==='Enter'&&chatIn.value.trim()){
      const d=new Date();
      const timeStr=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      push(ref(db,'chat'),{ sender:myName, text:chatIn.value, col:document.getElementById('color-select').value, font:document.getElementById('font-select').value, time:timeStr });
      chatIn.value='';
    }
    e.stopPropagation();
  };
  chatIn.onfocus=()=>{ Object.keys(keys).forEach(k=>keys[k]=false); };
  onValue(ref(db,'chat'),s=>{
    const box=document.getElementById('chat-messages'); box.innerHTML='';
    Object.values(s.val()||{}).slice(-30).forEach(m=>{
      const isOwner=m.sender.toLowerCase()==='eelaska';
      const tag=isOwner?'<span class="gold-tag">[OWNER]</span> ':'';
      const colStyle=m.col==='rainbow'?'animation:rainbow-cycle 1s linear infinite;font-weight:bold;':`color:${m.col||'#fff'}`;
      const fontStyle=`font-family:${m.font||'VT323'},monospace`;
      box.innerHTML+=`<div class="chat-msg"><span class="chat-time">${m.time||''}</span>${tag}<b>${escHtml(m.sender)}:</b> <span style="${colStyle};${fontStyle}">${escHtml(m.text)}</span></div>`;
    });
    box.scrollTop=box.scrollHeight;
  });

  // Slot keys
  window.onkeydown=e=>{
    const k=e.key.toLowerCase();
    if(document.getElementById('chat-input')===document.activeElement) return;
    keys[k]=true;
    if(['1','2','3','4','5'].includes(e.key)){ setSlot(+e.key); }
  };
  window.onkeyup=e=>{ keys[e.key.toLowerCase()]=false; };

  // Block placement
  canvas.oncontextmenu=e=>{
    e.preventDefault();
    if(isErrorVisible||isDead) return;
    const mx=e.clientX+cameraX, my=e.clientY+cameraY;
    const gx=Math.round(mx/BS)*BS, gy=Math.round(my/BS)*BS;
    if(gx<=-WORLD_W*BS||gx>=WORLD_W*BS||gy<=-(WORLD_H_BLOCKS*BS)) return showError();
    if(selectedSlot===5){
      for(let id in blocks) if(Math.abs(blocks[id].x-gx)<BS/2&&Math.abs(blocks[id].y-gy)<BS/2){ remove(ref(db,`blocks/${id}`)); sfxBreak(); }
    } else {
      // Check if space is empty
      let occupied=false;
      for(let id in blocks) if(Math.abs(blocks[id].x-gx)<BS/2&&Math.abs(blocks[id].y-gy)<BS/2){ occupied=true; break; }
      if(!occupied){ push(ref(db,'blocks'),{x:gx,y:gy,type:selectedSlot,vy:0,falling:false}); sfxPlace(); }
    }
  };

  // Shooting
  canvas.onclick=e=>{
    if(!isAdmin||!document.getElementById('gun-hack').checked||isDead) return;
    const now=Date.now();
    if(now-lastShot<GUN_COOLDOWN) return;
    lastShot=now;
    sfxGunshot();
    const mx=e.clientX+cameraX, my=e.clientY+cameraY;
    const bx=pLocal.x+PLAYER_W/2, by=pLocal.y+PLAYER_H/2;
    const dx=mx-bx, dy=my-by;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const spd=20;
    const bullet={
      id:'b_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
      x:bx, y:by, vx:(dx/dist)*spd, vy:(dy/dist)*spd,
      owner:myId, dmg:GUN_DAMAGE, ts:Date.now()
    };
    push(ref(db,'bullets'),bullet);
  };

  // HP regen
  setInterval(()=>{
    if(!isDead&&myHp<HP_MAX){
      myHp=Math.min(HP_MAX,myHp+HP_REGEN);
      update(ref(db,`players/${myId}`),{hp:myHp});
    }
  },HP_REGEN_INTERVAL);

  // Initial char selector state
  document.querySelectorAll('.char-btn')[0].classList.add('selected');

  // Remove old bullets
  setInterval(()=>{
    const now=Date.now();
    get(ref(db,'bullets')).then(s=>{
      const bls=s.val()||{};
      Object.entries(bls).forEach(([id,b])=>{ if(now-b.ts>5000) remove(ref(db,`bullets/${id}`)); });
    });
  },3000);

  requestAnimationFrame(gameLoop);
}

function dieProperly(){
  isDead=true;
  document.getElementById('death-screen').style.display='flex';
  sfxHit();
}

function setSlot(n){
  selectedSlot=n;
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('active'));
  document.getElementById('slot'+n)?.classList.add('active');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ===== BLOCK PHYSICS =====
let lastPhysics=0;
function updateBlockPhysics(){
  const now=Date.now();
  if(now-lastPhysics<200) return;
  lastPhysics=now;

  const blockArr=Object.entries(blocks);
  const occupiedSet=new Set(blockArr.map(([,b])=>`${Math.round(b.x/BS)},${Math.round(b.y/BS)}`));
  const groundY=getGroundY();
  const groundRow=Math.round(groundY/BS);

  blockArr.forEach(([id,b])=>{
    const bRow=Math.round(b.y/BS);
    const bCol=Math.round(b.x/BS);
    const belowKey=`${bCol},${bRow+1}`;
    const isOnGround=(bRow+1)>=groundRow;
    if(!isOnGround && !occupiedSet.has(belowKey)){
      // Fall one step
      update(ref(db,`blocks/${id}`),{y:b.y+BS,falling:true});
      sfxLand();
    }
  });
}

// ===== GAME LOOP =====
let lastFrame=0, stepTimer=0;

function gameLoop(ts){
  requestAnimationFrame(gameLoop);
  const dt=Math.min(ts-lastFrame,50); lastFrame=ts;

  if(isDead||!pLocal){ drawScene(); return; }

  const fly=isAdmin&&document.getElementById('fly-hack')?.checked;
  const groundY=getGroundY();
  const isTyping=document.getElementById('chat-input')===document.activeElement;

  if(!isTyping){
    if(keys['a']||keys['arrowleft']){ pLocal.vx=-7; pLocal.facing=-1; }
    else if(keys['d']||keys['arrowright']){ pLocal.vx=7; pLocal.facing=1; }
    else pLocal.vx*=0.75;

    if(fly){
      if(keys['w']||keys['arrowup']) pLocal.vy=-7;
      else if(keys['s']||keys['arrowdown']) pLocal.vy=7;
      else pLocal.vy=0;
    } else {
      pLocal.vy+=GRAVITY;
    }

    const isGrounded=pLocal.y>=groundY-PLAYER_H-1;
    if(!fly&&(keys['w']||keys['arrowup']||keys[' '])&&isGrounded){ pLocal.vy=JUMP_FORCE; sfxJump(); }

    // Step sound
    if(isGrounded && (keys['a']||keys['d']||keys['arrowleft']||keys['arrowright'])){
      stepTimer+=dt;
      if(stepTimer>250){ sfxStep(); stepTimer=0; }
    } else stepTimer=0;

    // Land sound
    if(!lastGrounded && isGrounded){ sfxLand(); }
    lastGrounded=isGrounded;
  }

  pLocal.x+=pLocal.vx;
  pLocal.y+=pLocal.vy;

  // Block collision
  for(let id in blocks){
    const b=blocks[id];
    const bRight=b.x+BS, bBottom=b.y+BS;
    // Check AABB
    if(pLocal.x<bRight&&pLocal.x+PLAYER_W>b.x&&pLocal.y<bBottom&&pLocal.y+PLAYER_H>b.y){
      const overlapLeft=(pLocal.x+PLAYER_W)-b.x;
      const overlapRight=bRight-pLocal.x;
      const overlapTop=(pLocal.y+PLAYER_H)-b.y;
      const overlapBottom=bBottom-pLocal.y;
      const minOverlap=Math.min(overlapLeft,overlapRight,overlapTop,overlapBottom);
      if(minOverlap===overlapTop&&pLocal.vy>=0){ pLocal.y=b.y-PLAYER_H; pLocal.vy=0; lastGrounded=true; }
      else if(minOverlap===overlapBottom&&pLocal.vy<0){ pLocal.y=bBottom; pLocal.vy=0; }
      else if(minOverlap===overlapLeft){ pLocal.x=b.x-PLAYER_W; pLocal.vx=0; }
      else if(minOverlap===overlapRight){ pLocal.x=bRight; pLocal.vx=0; }
    }
  }

  // Ground
  if(pLocal.y>=groundY-PLAYER_H){ pLocal.y=groundY-PLAYER_H; pLocal.vy=0; }

  // World bounds
  const WB=WORLD_W*BS;
  if(pLocal.x<-WB) pLocal.x=-WB;
  if(pLocal.x>WB-PLAYER_W) pLocal.x=WB-PLAYER_W;
  if(pLocal.y<-(WORLD_H_BLOCKS*BS)) pLocal.y=-(WORLD_H_BLOCKS*BS);

  animFrame++;
  pLocal.animFrame=animFrame;
  pLocal.char=selectedChar;

  cameraX=pLocal.x+PLAYER_W/2-canvas.width/2;
  cameraY=pLocal.y+PLAYER_H/2-canvas.height/2;

  update(ref(db,`players/${myId}`),{
    x:Math.round(pLocal.x), y:Math.round(pLocal.y),
    char:pLocal.char, name:myName, facing:pLocal.facing,
    animFrame:pLocal.animFrame, hp:myHp, dead:false
  });

  updateBlockPhysics();
  updateBullets();
  drawScene();
  drawMinimap();
}

function updateBullets(){
  bullets.forEach(b=>{
    b.x+=b.vx; b.y+=b.vy;
    if(b.owner!==myId){
      const px=pLocal.x, py=pLocal.y;
      if(b.x>px&&b.x<px+PLAYER_W&&b.y>py&&b.y<py+PLAYER_H){
        myHp=Math.max(0,myHp-b.dmg);
        update(ref(db,`players/${myId}`),{hp:myHp});
        sfxHit();
        // Spawn hit particles
        for(let i=0;i<8;i++) particles.push({x:pLocal.x+PLAYER_W/2,y:pLocal.y+PLAYER_H/2,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:30,color:'#ff4444'});
        if(myHp<=0&&!isDead) dieProperly();
      }
    }
  });
  // Remove old bullets from local list (Firebase listener handles real cleanup)
  const now=Date.now();
  bullets=bullets.filter(b=>now-b.ts<5000);
  // Update particle lifetimes
  particles=particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.3; p.life--; return p.life>0; });
}

// ===== DRAW SCENE =====
function drawScene(){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#0d1b3e');
  skyGrad.addColorStop(0.5,'#1a3a6e');
  skyGrad.addColorStop(1,'#2a5a9e');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,W,H);

  // Stars (parallax)
  ctx.fillStyle='rgba(255,255,255,0.6)';
  for(let i=0;i<60;i++){
    const sx=((i*137.5+30000)%(WORLD_W*BS*2))-(WORLD_W*BS);
    const sy=-200+((i*97.3)%500);
    const px=(sx-cameraX*0.1)%W;
    ctx.fillRect(px,sy-cameraY*0.05,i%3===0?2:1,i%3===0?2:1);
  }

  // Distant mountains (parallax layer 1)
  ctx.fillStyle='#1a2a4e';
  for(let i=-2;i<14;i++){
    const mx=i*180-((cameraX*0.2)%180);
    const mh=80+((i*73+110)%120);
    ctx.beginPath(); ctx.moveTo(mx,H-130); ctx.lineTo(mx+90,H-130-mh); ctx.lineTo(mx+180,H-130); ctx.fill();
  }
  // Closer hills (parallax layer 2)
  ctx.fillStyle='#14321e';
  for(let i=-2;i<14;i++){
    const mx=i*220-((cameraX*0.4)%220);
    const mh=40+((i*53+30)%60);
    ctx.beginPath(); ctx.moveTo(mx,H-130); ctx.lineTo(mx+110,H-130-mh); ctx.lineTo(mx+220,H-130); ctx.fill();
  }

  // Ground plane
  const groundY=getGroundY();
  const gsy=groundY-cameraY;
  const groundGrad=ctx.createLinearGradient(0,gsy,0,H);
  groundGrad.addColorStop(0,'#2d5a1b');
  groundGrad.addColorStop(0.05,'#1e3d12');
  groundGrad.addColorStop(1,'#0d1a08');
  ctx.fillStyle=groundGrad;
  ctx.fillRect(0,gsy,W,H-gsy+20);
  // Grass line
  ctx.fillStyle='#4a8a2a';
  ctx.fillRect(0,gsy,W,6);
  ctx.fillStyle='#5aaa3a';
  for(let gx=0;gx<W;gx+=8){
    const gh=4+((gx*13)%8);
    ctx.fillRect(gx,gsy-gh,4,gh);
  }

  // World boundary walls
  const WB=WORLD_W*BS;
  const wsx=-WB-cameraX, wesx=WB-cameraX;
  drawWorldWall(ctx,wsx-BS,groundY-cameraY-800,true);
  drawWorldWall(ctx,wesx,groundY-cameraY-800,false);

  // Ceiling
  const ceilY=-(WORLD_H_BLOCKS*BS);
  ctx.fillStyle='#2a1a0a';
  for(let ci=-WORLD_W-2;ci<=WORLD_W+2;ci++){
    ctx.fillRect(ci*BS-cameraX,ceilY-cameraY,BS,BS);
    ctx.strokeStyle='#1a0a00'; ctx.lineWidth=1;
    ctx.strokeRect(ci*BS-cameraX,ceilY-cameraY,BS,BS);
  }

  // Blocks
  for(let id in blocks){
    const b=blocks[id];
    drawBlock(ctx,b.x-cameraX,b.y-cameraY,b.type);
  }

  // Players
  for(let id in players){
    const p=players[id];
    if(p.dead) continue;
    const sx=p.x-cameraX, sy=p.y-cameraY;
    const isAir=p.vy!==0;
    drawCharacter(ctx,p.char,sx,sy,p.facing||1,p.animFrame||0,isAir);
    // Name tag
    ctx.font='bold 15px VT323, monospace';
    ctx.textAlign='center';
    const isEelaska=p.name&&p.name.toLowerCase()==='eelaska';
    if(isEelaska){
      ctx.fillStyle='#ffd700';
      ctx.fillText('[OWNER] '+p.name,sx+PLAYER_W/2,sy-22);
    } else {
      ctx.fillStyle='white';
      ctx.fillText(p.name||'',sx+PLAYER_W/2,sy-20);
    }
    // HP bar
    const hp=id===myId?myHp:(p.hp||HP_MAX);
    const hpPct=hp/HP_MAX;
    const barW=44, barH=5;
    const bx=sx+PLAYER_W/2-barW/2, by=sy-14;
    ctx.fillStyle='#333'; ctx.fillRect(bx,by,barW,barH);
    const hpColor=hpPct>0.6?'#44ff44':hpPct>0.3?'#ffaa00':'#ff2222';
    ctx.fillStyle=hpColor; ctx.fillRect(bx,by,barW*hpPct,barH);
    ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(bx,by,barW,barH);
  }

  // Bullets
  bullets.forEach(b=>{
    const bx=b.x-cameraX, by=b.y-cameraY;
    // Glow
    const grd=ctx.createRadialGradient(bx,by,0,bx,by,8);
    grd.addColorStop(0,'rgba(255,200,50,0.8)');
    grd.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(bx,by,8,0,7); ctx.fill();
    // Core
    ctx.fillStyle='#ffe066'; ctx.beginPath(); ctx.arc(bx,by,3,0,7); ctx.fill();
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cameraX-2,p.y-cameraY-2,5,5);
  });
  ctx.globalAlpha=1;

  // My HP bar (HUD)
  if(!isDead) drawHpHud();
}

function drawWorldWall(ctx,x,yTop,isLeft){
  const H=canvas.height;
  ctx.fillStyle='#3a1a0a';
  ctx.fillRect(x,yTop,BS,H-yTop+100);
  ctx.strokeStyle='#1a0a00'; ctx.lineWidth=2;
  for(let wy=yTop;wy<H+100;wy+=BS){
    ctx.strokeRect(x,wy,BS,BS);
  }
  ctx.fillStyle='white'; ctx.font='bold 18px VT323,monospace';
  ctx.textAlign='center';
  ctx.fillText('MAAILMAN',x+BS/2,yTop+40);
  ctx.fillText('LOPPU',x+BS/2,yTop+62);
  ctx.fillText(':(',x+BS/2,yTop+84);
}

function drawHpHud(){
  const W=canvas.width;
  const hp=myHp, hpPct=hp/HP_MAX;
  const barW=200, barH=18, bx=W/2-barW/2, by=canvas.height-100;
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx-4,by-4,barW+8,barH+8);
  ctx.fillStyle='#222'; ctx.fillRect(bx,by,barW,barH);
  const col=hpPct>0.6?'#44dd44':hpPct>0.3?'#ffaa00':'#ff3333';
  ctx.fillStyle=col; ctx.fillRect(bx,by,barW*hpPct,barH);
  // Pulse if low
  if(hpPct<0.3){
    ctx.fillStyle=`rgba(255,0,0,${0.2+Math.sin(Date.now()*0.01)*0.2})`;
    ctx.fillRect(bx,by,barW*hpPct,barH);
  }
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(bx,by,barW,barH);
  ctx.fillStyle='white'; ctx.font='14px VT323,monospace'; ctx.textAlign='center';
  ctx.fillText(`❤ ${hp} / ${HP_MAX}`,bx+barW/2,by+14);
}

function drawMinimap(){
  const W=minimapCanvas.width, H=minimapCanvas.height;
  mctx.clearRect(0,0,W,H);
  mctx.fillStyle='rgba(0,20,40,0.8)'; mctx.fillRect(0,0,W,H);
  const scale=W/(WORLD_W*BS*2);
  // Blocks
  for(let id in blocks){
    const b=blocks[id], bt=BLOCK_TYPES[b.type]||BLOCK_TYPES[1];
    mctx.fillStyle=bt.color;
    mctx.fillRect((b.x+WORLD_W*BS)*scale, H*0.5+(b.y*scale*0.3), 2, 2);
  }
  // Players
  for(let id in players){
    const p=players[id]; if(p.dead) continue;
    mctx.fillStyle=id===myId?'#00ff00':'#ff4444';
    mctx.fillRect((p.x+WORLD_W*BS)*scale, H*0.5+(p.y*scale*0.15), 3, 3);
  }
  // Border
  mctx.strokeStyle='#2a2a5a'; mctx.lineWidth=1; mctx.strokeRect(0,0,W,H);
}

document.getElementById('menu-btn').onclick=window.goToMenu;
</script>
