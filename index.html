<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisu Game Päivitetty</title>
    <style>
        body {
            margin: 0; background-color: #f0f0f0; color: #121212;
            font-family: 'Tahoma', sans-serif; overflow: hidden;
        }
        
        /* RAINBOW COUNTER */
        #online-counter {
            position: absolute; top: 10px; right: 20px;
            font-family: 'Comic Sans MS', 'Tahoma', sans-serif;
            font-size: 32px; font-weight: bold; z-index: 50;
            animation: rainbow-text 3s linear infinite;
        }

        /* UI PANELS */
        #login-screen, #death-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #delete-acc-btn {
            position: absolute; top: 10px; left: 10px;
            background: #ff4444; color: white; border: none; padding: 10px;
            cursor: pointer; font-weight: bold; z-index: 101;
        }

        /* CHAT */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px;
            width: 350px; height: 300px; background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; z-index: 60;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; color: white; font-size: 13px; }
        #chat-input-row { display: flex; background: #222; }
        #chat-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        
        #chat-customizer {
            background: #333; padding: 5px; display: flex; gap: 5px; flex-wrap: wrap;
        }

        /* ADMIN MENU */
        #admin-panel {
            position: absolute; top: 50px; left: 10px;
            background: #1a1a1a; border: 2px solid #333; color: #0f0;
            padding: 10px; display: none; z-index: 70; font-family: monospace;
        }

        canvas { display: block; background: #fff; }

        @keyframes rainbow-text {
            0% { color: red; } 20% { color: orange; } 40% { color: yellow; }
            60% { color: green; } 80% { color: blue; } 100% { color: red; }
        }
        @keyframes fire-slide {
            from { background-position: 0% 50%; } to { background-position: 100% 50%; }
        }
        .death-text { color: red; font-weight: bold; animation: shake 0.2s infinite; font-size: 40px; }
        @keyframes shake { 0% { transform: translate(0,0); } 50% { transform: translate(2px, 2px); } 100% { transform: translate(-2px, -2px); } }
        
        .gold-tag {
            background: linear-gradient(90deg, #ffd700, #fff, #ffd700);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: fire-slide 2s linear infinite;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="delete-acc-btn" style="display:none;">DELETE ACCOUNT</button>
    <div id="online-counter">Online: 1</div>

    <div id="login-screen">
        <h1 style="font-family: 'Comic Sans MS'">Sisu Game Päivitetty</h1>
        <input type="text" id="username-input" placeholder="Username (A-Z, 0-9, Ä, Ö)..." maxlength="20">
        <div style="margin: 10px;">
            <label>Choose Character Color:</label>
            <input type="color" id="char-color" value="#0000ff">
        </div>
        <button id="login-btn">Start Game</button>
        <p id="error-msg" style="color:red"></p>
    </div>

    <div id="death-screen" style="display:none;">
        <h1 class="death-text">kuolit hahahahahahahahahahahHAHAHAHAAH</h1>
        <button onclick="location.reload()">RESPAWN</button>
        <button id="death-delete-btn" style="margin-top:20px; background:red; color:white;">DELETE ACCOUNT</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div id="admin-panel">
            <b>[ADMIN MENU]</b><br>
            <label><input type="checkbox" id="fly-hack"> Fly Hack</label><br>
            <label><input type="checkbox" id="gun-hack"> Gun Hack</label>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-customizer">
                <select id="font-select">
                    <option value="Tahoma">Tahoma</option>
                    <option value="'Comic Sans MS'">Comic Sans</option>
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Retro</option>
                </select>
                <select id="color-select">
                    <option value="white">White</option>
                    <option value="pink">Pink</option>
                    <option value="cyan">Blue</option>
                    <option value="#0f0">Green</option>
                    <option value="rainbow">Rainbow</option>
                </select>
            </div>
            <div id="chat-input-row">
                <input type="text" id="chat-input" placeholder="Press Enter to chat...">
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, push, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
            authDomain: "gamesisu-837b9.firebaseapp.com",
            projectId: "gamesisu-837b9",
            databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONSTANTS ---
        const BLOCK_SIZE = 60;
        const PLAYER_W = 40;
        const PLAYER_H = 80; // Character is 2 blocks high roughly
        const GRAVITY = 0.4;
        const FRICTION = 0.8;

        let myData = JSON.parse(localStorage.getItem('sisu_user')) || null;
        let players = {};
        let worldBlocks = {};
        let myBullets = [];

        // --- DOM ELEMENTS ---
        const loginScreen = document.getElementById('login-screen');
        const gameUI = document.getElementById('game-ui');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const counter = document.getElementById('online-counter');

        // --- LOGIN LOGIC ---
        document.getElementById('login-btn').onclick = async () => {
            const rawName = document.getElementById('username-input').value.trim();
            const color = document.getElementById('char-color').value;
            const regex = /^[a-zA-Z0-9ääööÄÄÖÖ]+$/;

            if (!regex.test(rawName) || rawName.length > 20) {
                document.getElementById('error-msg').innerText = "Invalid Name (Max 20, Letters/Numbers only)";
                return;
            }

            // Check if taken
            const userRef = ref(db, `usernames/${rawName}`);
            onValue(userRef, (snap) => {
                if (snap.exists() && !myData) {
                    document.getElementById('error-msg').innerText = "Name Taken!";
                } else {
                    myData = { id: "u_" + Date.now(), name: rawName, color: color };
                    localStorage.setItem('sisu_user', JSON.stringify(myData));
                    set(userRef, myData.id);
                    onDisconnect(userRef).remove();
                    initGame();
                }
            }, { onlyOnce: true });
        };

        const deleteAccount = () => {
            if (myData) {
                remove(ref(db, `usernames/${myData.name}`));
                remove(ref(db, `players/${myData.id}`));
                localStorage.removeItem('sisu_user');
                location.reload();
            }
        };
        document.getElementById('delete-acc-btn').onclick = deleteAccount;
        document.getElementById('death-delete-btn').onclick = deleteAccount;

        if (myData) initGame();

        function initGame() {
            loginScreen.style.display = 'none';
            gameUI.style.display = 'block';
            document.getElementById('delete-acc-btn').style.display = 'block';
            if (myData.name === "eelaska") document.getElementById('admin-panel').style.display = 'block';

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let player = {
                x: 100, y: 100, vx: 0, vy: 0, 
                facing: 1, walking: false, frame: 0,
                equipped: "Wood", font: "Tahoma", chatCol: "white"
            };

            const pRef = ref(db, `players/${myData.id}`);
            onDisconnect(pRef).remove();

            // Sync
            onValue(ref(db, 'players'), s => { 
                players = s.val() || {};
                counter.innerText = "Online: " + Object.keys(players).length;
                if (players[myData.id] && players[myData.id].dead) {
                    document.getElementById('death-screen').style.display = 'flex';
                }
            });
            onValue(ref(db, 'blocks'), s => worldBlocks = s.val() || {});

            // Keys
            const keys = {};
            window.onkeydown = (e) => {
                if (document.activeElement.id === 'chat-input') return;
                keys[e.key.toLowerCase()] = true;
                if (e.key === '1') player.equipped = "Wood";
                if (e.key === '2') player.equipped = "Stone";
                if (e.key === '3') player.equipped = "Eraser";
            };
            window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

            // Chat
            const chatInput = document.getElementById('chat-input');
            chatInput.onkeydown = (e) => {
                if (e.key === 'Enter' && chatInput.value.trim()) {
                    const msg = chatInput.value;
                    const time = new Date().toLocaleTimeString();
                    push(ref(db, 'chat'), {
                        sender: myData.name,
                        text: msg,
                        time: time,
                        color: player.chatCol,
                        font: player.font,
                        isAdmin: myData.name === "eelaska"
                    });
                    chatInput.value = "";
                }
            };

            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                Object.values(s.val() || {}).slice(-20).forEach(m => {
                    const d = document.createElement('div');
                    const isRainbow = m.color === 'rainbow' ? 'animation: rainbow-text 1s infinite;' : `color: ${m.color};`;
                    const tag = m.isAdmin ? '<span class="gold-tag">[OWNER]</span> ' : '';
                    d.innerHTML = `<small>${m.time}</small> ${tag}<b>${m.sender}:</b> <span style="font-family:${m.font}; ${isRainbow}">${m.text}</span>`;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });

            document.getElementById('color-select').onchange = (e) => player.chatCol = e.target.value;
            document.getElementById('font-select').onchange = (e) => player.font = e.target.value;

            // SHOOTING
            window.onclick = (e) => {
                if (document.getElementById('gun-hack').checked && myData.name === "eelaska") {
                    const rect = canvas.getBoundingClientRect();
                    const tx = e.clientX - rect.left;
                    const ty = e.clientY - rect.top;
                    const angle = Math.atan2(ty - (player.y + 40), tx - (player.x + 20));
                    myBullets.push({ x: player.x + 20, y: player.y + 40, vx: Math.cos(angle) * 10, vy: Math.sin(angle) * 10 });
                }
            };

            window.oncontextmenu = (e) => {
                e.preventDefault();
                const tx = player.x + (player.facing * (BLOCK_SIZE + 10));
                const ty = player.y + 10;
                
                if (player.equipped === "Eraser") {
                    for(let id in worldBlocks) {
                        let b = worldBlocks[id];
                        if (tx > b.x && tx < b.x + BLOCK_SIZE && ty > b.y && ty < b.y + BLOCK_SIZE) {
                            remove(ref(db, `blocks/${id}`)); return;
                        }
                    }
                } else {
                    const bRef = push(ref(db, 'blocks'));
                    set(bRef, { x: tx, y: ty, type: player.equipped, vy: 0 });
                }
            };

            function drawPlayer(ctx, p, color, name) {
                // Stickman logic improved
                ctx.strokeStyle = color; ctx.lineWidth = 4;
                const frame = p.walking ? Math.sin(p.frame * 0.2) * 15 : 0;
                
                // Head
                ctx.beginPath(); ctx.arc(p.x + 20, p.y + 15, 12, 0, Math.PI * 2); ctx.stroke();
                // Body
                ctx.beginPath(); ctx.moveTo(p.x + 20, p.y + 27); ctx.lineTo(p.x + 20, p.y + 55); ctx.stroke();
                // Arms
                ctx.beginPath(); ctx.moveTo(p.x + 20, p.y + 35); ctx.lineTo(p.x + 20 + (p.facing * 15), p.y + 45 + frame); ctx.stroke();
                // Legs
                ctx.beginPath(); ctx.moveTo(p.x + 20, p.y + 55); ctx.lineTo(p.x + 20 + frame, p.y + 80); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(p.x + 20, p.y + 55); ctx.lineTo(p.x + 20 - frame, p.y + 80); ctx.stroke();

                // Name
                ctx.fillStyle = "black"; ctx.font = "14px Tahoma"; ctx.textAlign = "center";
                const isAdmin = name === "eelaska";
                if (isAdmin) {
                    ctx.fillStyle = "gold";
                    ctx.fillText("[OWNER]", p.x + 20, p.y - 25);
                }
                ctx.fillStyle = "grey"; ctx.font = "10px Tahoma";
                ctx.fillText(`[${p.equipped}]`, p.x + 20, p.y - 12);
                ctx.fillStyle = "black"; ctx.font = "bold 14px Tahoma";
                ctx.fillText(name, p.x + 20, p.y - 2);
            }

            function loop() {
                // Movement
                const isFlying = document.getElementById('fly-hack').checked && myData.name === "eelaska";
                
                if (keys['a']) { player.vx = -4; player.facing = -1; player.walking = true; }
                else if (keys['d']) { player.vx = 4; player.facing = 1; player.walking = true; }
                else { player.vx *= FRICTION; player.walking = false; }

                if (isFlying) {
                    if (keys['w']) player.vy = -4;
                    else if (keys['s']) player.vy = 4;
                    else player.vy = 0;
                } else {
                    player.vy += GRAVITY;
                }

                player.x += player.vx;
                player.y += player.vy;

                // Collisions (Floor)
                if (player.y > canvas.height - PLAYER_H) {
                    player.y = canvas.height - PLAYER_H;
                    player.vy = 0;
                }
                if (keys['w'] && player.vy === 0 && !isFlying) player.vy = -10;

                // Block Physics & Collision
                for (let id in worldBlocks) {
                    let b = worldBlocks[id];
                    
                    // Blocks fall
                    let supported = b.y >= canvas.height - BLOCK_SIZE;
                    for (let id2 in worldBlocks) {
                        let b2 = worldBlocks[id2];
                        if (id !== id2 && b.x < b2.x + BLOCK_SIZE && b.x + BLOCK_SIZE > b2.x && b.y + BLOCK_SIZE === b2.y) supported = true;
                    }
                    if (!supported) {
                        b.y += 2;
                        update(ref(db, `blocks/${id}`), { y: b.y });
                    }

                    // Player vs Block (Solid)
                    if (player.x < b.x + BLOCK_SIZE && player.x + PLAYER_W > b.x && player.y < b.y + BLOCK_SIZE && player.y + PLAYER_H > b.y) {
                        // Push
                        if (player.y + PLAYER_H - 10 > b.y && player.y < b.y + BLOCK_SIZE - 10) {
                            if (player.vx > 0) b.x += 2; else b.x -= 2;
                            update(ref(db, `blocks/${id}`), { x: b.x });
                            player.x -= player.vx; 
                        } else if (player.vy > 0) { // Top collision
                            player.y = b.y - PLAYER_H;
                            player.vy = 0;
                        }
                    }
                }

                if (player.walking) player.frame++;
                update(pRef, { ...player, name: myData.name, color: myData.color });

                // Draw
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (let id in worldBlocks) {
                    let b = worldBlocks[id];
                    ctx.fillStyle = b.type === 'Wood' ? '#8B4513' : '#555';
                    ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }

                for (let id in players) {
                    if (id !== myData.id) drawPlayer(ctx, players[id], players[id].color, players[id].name);
                }
                drawPlayer(ctx, player, myData.color, myData.name);

                // Bullets
                myBullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    ctx.fillStyle = "red"; ctx.fillRect(b.x, b.y, 5, 5);
                    // Hit detection
                    for (let pid in players) {
                        let p = players[pid];
                        if (pid !== myData.id && b.x > p.x && b.x < p.x + PLAYER_W && b.y > p.y && b.y < p.y + PLAYER_H) {
                            update(ref(db, `players/${pid}`), { dead: true });
                            myBullets.splice(i, 1);
                        }
                    }
                });

                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
