<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uwu - Deluxe</title>
    <style>
        body {
            margin: 0;
            background-color: #f0f0f0; 
            color: #121212;
            font-family: 'Tahoma', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        #login-screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #login-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 5s linear infinite;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }
        
        #game-ui { display: none; position: relative; width: 100vw; height: 100vh; }
        
        canvas {
            background-color: #ffffff;
            display: block;
        }

        /* CHAT STYLES */
        #chat-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 250px;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            border-radius: 5px;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
        }
        #typing-indicator {
            height: 15px;
            font-size: 11px;
            font-style: italic;
            padding-left: 5px;
            color: #555;
        }
        #chat-input {
            border: none;
            border-top: 1px solid #ccc;
            padding: 8px;
            outline: none;
        }

        #controls-hint {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.7);
            padding: 5px 15px;
            border-radius: 20px;
            pointer-events: none;
        }

        input { padding: 10px; font-size: 18px; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #121212; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-title">sisu game päivitetty</div>
        <input type="text" id="username-input" placeholder="Enter Username..." maxlength="12">
        <button id="login-btn">pelaa Game</button>
        <div id="error-msg"></div>
    </div>

    <div id="game-ui">
        <div id="controls-hint">
            <b>1</b>: Wood | <b>2</b>: Stone | <b>3</b>: Delete | <b>Right-Click</b>: Action | <b>Enter</b>: Chat
        </div>
        <canvas id="gameCanvas"></canvas>
        
        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="typing-indicator"></div>
            <input type="text" id="chat-input" placeholder="Press Enter to chat..." maxlength="100">
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, onDisconnect, push, remove, update as fbUpdate } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvqYVI8UT4jZVHdj-1sT2cAYQYFzMbZ1k",
            authDomain: "gamesisu-837b9.firebaseapp.com",
            projectId: "gamesisu-837b9",
            databaseURL: "https://gamesisu-837b9-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- UI LOGIC ---
        let myUsername = "";
        let playerId = "";
        const loginBtn = document.getElementById("login-btn");
        const usernameInput = document.getElementById("username-input");

        loginBtn.addEventListener("click", async () => {
            const desiredName = usernameInput.value.trim();
            if (desiredName.length < 2) return;
            myUsername = desiredName;
            playerId = "user_" + Date.now();
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("game-ui").style.display = "block";
            startGame();
        });

        function startGame() {
            const canvas = document.getElementById("gameCanvas");
            const ctx = canvas.getContext("2d");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const BLOCK_SIZE = 40;
            const PLAYER_SIZE = 45;
            
            let myPlayer = {
                id: playerId,
                username: myUsername,
                x: 400, y: 100,
                color: `hsl(${Math.random() * 360}, 70%, 40%)`,
                facingRight: true,
                dy: 0,
                walking: false,
                walkFrame: 0,
                equipped: "None",
                isTyping: false
            };

            let players = {};
            let worldBlocks = {};
            let selectedTool = 1; // 1: Wood, 2: Stone, 3: Delete

            const myPlayerRef = ref(db, `players/${playerId}`);
            set(myPlayerRef, myPlayer);
            onDisconnect(myPlayerRef).remove();

            onValue(ref(db, `players`), (snap) => players = snap.val() || {});
            onValue(ref(db, `blocks`), (snap) => worldBlocks = snap.val() || {});

            // --- CHAT LOGIC ---
            const chatInput = document.getElementById("chat-input");
            const chatBox = document.getElementById("chat-messages");
            const typingDiv = document.getElementById("typing-indicator");

            chatInput.addEventListener("input", () => {
                if (!myPlayer.isTyping) {
                    myPlayer.isTyping = true;
                    fbUpdate(myPlayerRef, { isTyping: true });
                }
                if(chatInput.value === "") {
                    myPlayer.isTyping = false;
                    fbUpdate(myPlayerRef, { isTyping: false });
                }
            });

            chatInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" && chatInput.value.trim() !== "") {
                    const now = new Date();
                    const timestamp = `[${now.toLocaleDateString()} ${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}]`;
                    const msgRef = push(ref(db, "chat"));
                    set(msgRef, {
                        user: myUsername,
                        text: chatInput.value,
                        time: timestamp
                    });
                    chatInput.value = "";
                    myPlayer.isTyping = false;
                    fbUpdate(myPlayerRef, { isTyping: false });
                }
            });

            onValue(ref(db, "chat"), (snap) => {
                chatBox.innerHTML = "";
                const msgs = snap.val();
                if (msgs) {
                    Object.values(msgs).slice(-15).forEach(m => {
                        const div = document.createElement("div");
                        div.innerHTML = `<span style="color:#888">${m.time}</span> <b>${m.user}:</b> ${m.text}`;
                        chatBox.appendChild(div);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });

            // --- INPUTS ---
            const keys = {};
            window.addEventListener("keydown", (e) => {
                if (document.activeElement === chatInput) return;
                keys[e.key.toLowerCase()] = true;
                if (e.key === '1') { selectedTool = 1; myPlayer.equipped = "Wood"; }
                if (e.key === '2') { selectedTool = 2; myPlayer.equipped = "Stone"; }
                if (e.key === '3') { selectedTool = 3; myPlayer.equipped = "Eraser"; }
                fbUpdate(myPlayerRef, { equipped: myPlayer.equipped });
            });
            window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

            canvas.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                const targetX = myPlayer.facingRight ? myPlayer.x + PLAYER_SIZE + 5 : myPlayer.x - BLOCK_SIZE - 5;
                const targetY = myPlayer.y + 5;

                if (selectedTool === 3) {
                    for (let id in worldBlocks) {
                        let b = worldBlocks[id];
                        if (targetX < b.x + BLOCK_SIZE && targetX + 10 > b.x && targetY < b.y + BLOCK_SIZE && targetY + 10 > b.y) {
                            remove(ref(db, `blocks/${id}`));
                            break;
                        }
                    }
                } else {
                    let type = selectedTool === 1 ? 'wood' : 'stone';
                    let finalY = targetY;
                    
                    // Logic: Stack if something is there
                    for (let id in worldBlocks) {
                        let b = worldBlocks[id];
                        if (Math.abs(targetX - b.x) < 20 && Math.abs(targetY - b.y) < 20) {
                            finalY = b.y - BLOCK_SIZE;
                        }
                    }

                    const newBlockRef = push(ref(db, `blocks`));
                    set(newBlockRef, { x: targetX, y: finalY, type: type });
                }
            });

            function drawStickman(ctx, x, y, color, isWalking, frame, facingRight) {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                // Head
                ctx.arc(x + 15, y + 10, 8, 0, Math.PI * 2);
                // Body
                ctx.moveTo(x + 15, y + 18); ctx.lineTo(x + 15, y + 32);
                // Arms
                let armWaver = isWalking ? Math.sin(frame * 0.2) * 10 : 0;
                ctx.moveTo(x + 15, y + 22); ctx.lineTo(x + 15 + (facingRight ? 10 : -10), y + 25 + armWaver);
                ctx.moveTo(x + 15, y + 22); ctx.lineTo(x + 15 - (facingRight ? 10 : -10), y + 25 - armWaver);
                // Legs
                let legMove = isWalking ? Math.sin(frame * 0.2) * 12 : 0;
                ctx.moveTo(x + 15, y + 32); ctx.lineTo(x + 15 + legMove, y + 45);
                ctx.moveTo(x + 15, y + 32); ctx.lineTo(x + 15 - legMove, y + 45);
                ctx.stroke();
            }

            // --- MAIN LOOP ---
            const speed = 4.5;
            const gravity = 0.5;

            function update() {
                let moved = false;
                myPlayer.walking = false;

                if (keys["a"]) { 
                    myPlayer.x -= speed; 
                    myPlayer.facingRight = false; 
                    myPlayer.walking = true;
                    moved = true; 
                }
                if (keys["d"]) { 
                    myPlayer.x += speed; 
                    myPlayer.facingRight = true; 
                    myPlayer.walking = true;
                    moved = true; 
                }

                myPlayer.dy += gravity;
                myPlayer.y += myPlayer.dy;

                // Collisions & Physics
                let onGround = false;
                if (myPlayer.y >= canvas.height - PLAYER_SIZE) {
                    myPlayer.y = canvas.height - PLAYER_SIZE;
                    myPlayer.dy = 0;
                    onGround = true;
                }

                for (let id in worldBlocks) {
                    let b = worldBlocks[id];
                    // Stand on top
                    if (myPlayer.x + 20 > b.x && myPlayer.x + 10 < b.x + BLOCK_SIZE) {
                        if (myPlayer.y + PLAYER_SIZE > b.y && myPlayer.y + PLAYER_SIZE < b.y + 15 && myPlayer.dy >= 0) {
                            myPlayer.y = b.y - PLAYER_SIZE;
                            myPlayer.dy = 0;
                            onGround = true;
                        }
                    }
                    // Push blocks (visual/logic update)
                    if (Math.abs(myPlayer.y - b.y) < 20) {
                        if (myPlayer.x + PLAYER_SIZE > b.x && myPlayer.x < b.x) {
                             fbUpdate(ref(db, `blocks/${id}`), { x: b.x + 2 });
                        } else if (myPlayer.x < b.x + BLOCK_SIZE && myPlayer.x > b.x) {
                             fbUpdate(ref(db, `blocks/${id}`), { x: b.x - 2 });
                        }
                    }
                }

                if (keys["w"] && onGround) {
                    myPlayer.dy = -10;
                    moved = true;
                }

                if (myPlayer.walking) myPlayer.walkFrame++;
                if (moved || myPlayer.dy !== 0) fbUpdate(myPlayerRef, { x: myPlayer.x, y: myPlayer.y, facingRight: myPlayer.facingRight, walking: myPlayer.walking, walkFrame: myPlayer.walkFrame });

                // Drawing
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Blocks
                for (let id in worldBlocks) {
                    let b = worldBlocks[id];
                    ctx.fillStyle = b.type === 'wood' ? "#8B4513" : "#777";
                    ctx.fillRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                    ctx.strokeStyle = "#000";
                    ctx.strokeRect(b.x, b.y, BLOCK_SIZE, BLOCK_SIZE);
                }

                // Players
                let typingText = "";
                for (let id in players) {
                    const p = players[id];
                    drawStickman(ctx, p.x, p.y, p.color, p.walking, p.walkFrame, p.facingRight);
                    
                    // Nametag + Equipped
                    ctx.fillStyle = "grey";
                    ctx.font = "10px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(`[${p.equipped || "None"}]`, p.x + 15, p.y - 22);
                    
                    ctx.fillStyle = "black";
                    ctx.font = "bold 12px Tahoma";
                    ctx.fillText(p.username, p.x + 15, p.y - 8);

                    if(p.isTyping && id !== playerId) typingText += `${p.username}, `;
                }
                
                typingDiv.innerText = typingText ? `${typingText.slice(0, -2)} is typing...` : "";

                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
